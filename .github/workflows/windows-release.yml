name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z format
        required: true
        default: 3.6.1
      publish_release:
        description: Publish the verified build to GitHub Releases
        required: true
        type: boolean
        default: false
      component_update:
        description: Build a component patch from the previous stable GitHub Release
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64 EXE and installer
    runs-on: windows-2025
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - name: Require update signing key for publication
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.DCMGET_UPDATE_SIGNING_PRIVATE_KEY_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_PRIVATE_KEY)) {
            throw "DCMGET_UPDATE_SIGNING_PRIVATE_KEY_BASE64 is required"
          }

      - name: Validate update publication inputs
        if: ${{ inputs.component_update && !inputs.publish_release }}
        shell: pwsh
        run: throw "component_update requires publish_release"

      - name: Check out 2.6.1 upgrade baseline
        uses: actions/checkout@v4
        with:
          ref: c01c83a1963a55457bef15917ddd4cfdbab81fd1
          path: upgrade-baseline

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip

      - name: Verify AMD64 Python build host
        shell: pwsh
        run: python -c "from dcmget.architecture import ensure_supported_runtime; ensure_supported_runtime(); print('AMD64 Python runtime verified')"

      - name: Configure optional Authenticode certificate
        shell: pwsh
        env:
          DCMGET_SIGN_CERTIFICATE_BASE64: ${{ secrets.DCMGET_SIGN_CERTIFICATE_BASE64 }}
          DCMGET_SIGN_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.DCMGET_SIGN_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DCMGET_SIGN_CERTIFICATE_BASE64)) {
            Write-Host "No signing certificate configured; release manifest will state UNSIGNED."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "dcmget-authenticode.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:DCMGET_SIGN_CERTIFICATE_BASE64)
          )
          "DCMGET_SIGN_CERTIFICATE_PATH=$certificatePath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "DCMGET_SIGN_CERTIFICATE_PASSWORD=$env:DCMGET_SIGN_CERTIFICATE_PASSWORD_SECRET" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "DCMGET_SIGN_TIMESTAMP_URL=http://timestamp.digicert.com" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Restore DCMTK cache
        uses: actions/cache@v4
        with:
          path: |
            .runtime/dcmtk/windows-x86_64
            .runtime/downloads
            .runtime/winsw/v2.12.0
          key: dcmtk-3.7.0-integrity-v2-windows-x86_64

      - name: Prepare DCMTK
        shell: pwsh
        run: |
          python scripts/download_dcmtk.py --platform windows-x86_64

      - name: Restore OHIF Viewer cache
        uses: actions/cache@v4
        with:
          path: .runtime/ohif
          key: ohif-3.12.6-${{ hashFiles('packaging/ohif/**', 'scripts/prepare_ohif.py') }}

      - name: Prepare OHIF Viewer offline assets
        shell: pwsh
        run: python scripts/prepare_ohif.py

      - name: Build standalone and portable EXE
        run: python scripts/build_windows.py --version "${{ inputs.version }}"

      - name: Verify AMD64 application and DCMTK payloads
        run: python scripts/build_windows.py --version "${{ inputs.version }}" --verify-architecture-only

      - name: Verify pinned WinSW service wrapper
        shell: pwsh
        run: |
          $winsw = (Resolve-Path ".runtime/winsw/v2.12.0/WinSW-x64.exe").Path
          $actual = (Get-FileHash $winsw -Algorithm SHA256).Hash.ToLowerInvariant()
          $expected = "05b82d46ad331cc16bdc00de5c6332c1ef818df8ceefcd49c726553209b3a0da"
          if ($actual -ne $expected) { throw "WinSW checksum mismatch: $actual" }

      - name: Verify Windows PowerShell service host syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [void][Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "packaging/windows/kayisoft-dcmget-host.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -ne 0) { throw ($errors | Out-String) }

      - name: Verify minimal DCMTK runtime and tools
        shell: pwsh
        run: |
          function Assert-MinimalDcmtk([string]$runtimeRoot, [bool]$startTools) {
            $bin = (Resolve-Path (Join-Path $runtimeRoot "dcmtk-3.7.0-win64-dynamic/bin")).Path
            $expected = @(
              "movescu.exe", "storescp.exe", "dcmmkdir.exe", "dcmdump.exe",
              "dcmdata.dll", "dcmimage.dll", "dcmimgle.dll", "dcmjpeg.dll",
              "dcmnet.dll", "dcmtls.dll", "ijg8.dll", "ijg12.dll", "ijg16.dll",
              "oficonv.dll", "oflog.dll", "ofstd.dll"
            ) | Sort-Object
            $actual = @(Get-ChildItem $bin -File | ForEach-Object Name | Sort-Object)
            $difference = @(Compare-Object $expected $actual)
            if ($difference.Count -ne 0) {
              throw "Packaged DCMTK bin allowlist mismatch: $($difference | Out-String)"
            }
            if (Test-Path (Join-Path $bin "dcmj2pnm.exe") -PathType Leaf) { throw "Unused dcmj2pnm.exe was packaged" }
            if (Test-Path (Join-Path $bin "dcmdjpeg.exe") -PathType Leaf) { throw "Unused dcmdjpeg.exe was packaged" }
            if ($startTools) {
              foreach ($tool in @("movescu.exe", "storescp.exe", "dcmmkdir.exe", "dcmdump.exe")) {
                & (Join-Path $bin $tool) --version | Out-Null
                if ($LASTEXITCODE -ne 0) { throw "$tool failed to start from the minimal runtime" }
              }
            }
          }

          $onedirRuntime = "build/windows/dist/DcmGet/_internal/.runtime/dcmtk/windows-x86_64"
          Assert-MinimalDcmtk $onedirRuntime $true
          $expanded = Join-Path $env:RUNNER_TEMP "dcmget-minimal-runtime-zip"
          Remove-Item $expanded -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive "release/windows/DcmGet-${{ inputs.version }}-windows-x64.zip" $expanded
          Assert-MinimalDcmtk (Join-Path $expanded "DcmGet/_internal/.runtime/dcmtk/windows-x86_64") $true
          Remove-Item $expanded -Recurse -Force

      - name: Verify real profile desktop shortcut
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP "DcmGet Shortcut Test"
          New-Item -ItemType Directory -Force $fixture | Out-Null
          $env:DCMGET_TEST_EXE = Join-Path $fixture "DcmGet.exe"
          $env:DCMGET_TEST_DESKTOP = Join-Path $fixture "Desktop"
          Copy-Item "build/windows/dist/DcmGet/DcmGet.exe" $env:DCMGET_TEST_EXE -Force
          python -c "import os; from dcmget.instance_shortcut import create_instance_shortcut, default_instance_shortcut_name; create_instance_shortcut(6, default_instance_shortcut_name(6666, 'DCMGET'), os.environ['DCMGET_TEST_DESKTOP'], web_port=8787, executable=os.environ['DCMGET_TEST_EXE'], frozen=True, platform='win32')"
          if ($LASTEXITCODE -ne 0) { throw "Could not create profile shortcut" }
          $link = Join-Path $env:DCMGET_TEST_DESKTOP "dcmget-6666-DCMGET.url"
          if (-not (Test-Path $link -PathType Leaf)) { throw "Profile URL shortcut was not created" }
          $content = Get-Content $link -Raw
          if ($content -notmatch '(?m)^URL=http://127\.0\.0\.1:8787/$') { throw "Profile URL shortcut target is incorrect: $content" }

      - name: Verify embedded NiceGUI, WebView, OHIF and PDI resources
        shell: pwsh
        run: |
          function Assert-WebResources([string]$resourceRoot) {
            $nicegui = Join-Path $resourceRoot "nicegui"
            @("static", "templates") | ForEach-Object {
              $asset = Join-Path $nicegui $_
              if (-not (Test-Path $asset -PathType Container)) {
                throw "Missing offline NiceGUI resource directory: $asset"
              }
            }
            if (-not (Test-Path (Join-Path $resourceRoot "webview") -PathType Container)) {
              throw "Missing embedded pywebview modules"
            }
            $webui = Join-Path $resourceRoot "dcmget\webui"
            @("index.html", "app.css", "app.js") | ForEach-Object {
              $asset = Join-Path $webui $_
              if (-not (Test-Path $asset -PathType Leaf)) {
                throw "Missing offline DcmGet Web resource: $asset"
              }
              if ((Get-Item $asset).Length -eq 0) {
                throw "Offline DcmGet Web resource is empty: $asset"
              }
            }
          }

          function Assert-PdiResources([string]$resourceRoot) {
            $server = Join-Path $resourceRoot "DcmGetPdiServer.exe"
            $serverScript = Join-Path $resourceRoot "dcmget\pdi_server.py"
            $architectureScript = Join-Path $resourceRoot "dcmget\architecture.py"
            $ohif = Join-Path $resourceRoot ".runtime\ohif\ohif-3.12.6"
            if (-not (Test-Path $server -PathType Leaf)) { throw "Missing PDI server at $server" }
            if (-not (Test-Path $serverScript -PathType Leaf)) { throw "Missing portable PDI server script at $serverScript" }
            if (-not (Test-Path $architectureScript -PathType Leaf)) { throw "Missing PDI architecture guard at $architectureScript" }
            @(
              "index.html", "app-config.js", "init-service-worker.js",
              "LICENSE-OHIF.txt", "THIRD_PARTY-OHIF.md",
              "DCMGET_OHIF_PAYLOAD.json", "DCMGET_PAYLOAD.SHA256"
            ) | ForEach-Object {
              if (-not (Test-Path (Join-Path $ohif $_) -PathType Leaf)) {
                throw "Missing OHIF resource: $_"
              }
            }
            if (Test-Path (Join-Path $ohif "sw.js")) { throw "Online service worker was packaged" }
          }

          $unpackedResourceRoot = (Resolve-Path "build/windows/dist/DcmGet/_internal").Path
          Assert-WebResources $unpackedResourceRoot
          Assert-PdiResources $unpackedResourceRoot
          if (Test-Path (Join-Path $unpackedResourceRoot "DCMGET_PORTABLE_RUNTIME.json")) {
            throw "Unpacked application must not publish DCMTK to the portable user runtime"
          }
          $expanded = Join-Path $env:RUNNER_TEMP "dcmget-standalone-expanded"
          Expand-Archive "release/windows/DcmGet-${{ inputs.version }}-windows-x64.zip" $expanded
          $zipResourceRoot = (Resolve-Path "$expanded/DcmGet/_internal").Path
          Assert-WebResources $zipResourceRoot
          Assert-PdiResources $zipResourceRoot
          if (Test-Path (Join-Path $zipResourceRoot "DCMGET_PORTABLE_RUNTIME.json")) {
            throw "ZIP application must not publish DCMTK to the portable user runtime"
          }

          $archiveListing = "build/windows/portable-archive.txt"
          pyi-archive_viewer -r "release/windows/DcmGet-${{ inputs.version }}-windows-x64-portable.exe" *> $archiveListing
          if ($LASTEXITCODE -ne 0) { throw "Could not inspect portable EXE archive" }
          if (-not (Select-String -Path $archiveListing -Pattern "DcmGetPdiServer\.exe" -Quiet)) { throw "Portable EXE is missing PDI server" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*pdi_server\.py" -Quiet)) { throw "Portable EXE is missing portable PDI server script" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*architecture\.py" -Quiet)) { throw "Portable EXE is missing PDI architecture guard" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*instance_shortcut" -Quiet)) { throw "Portable EXE is missing profile shortcut support" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*webui.*index\.html" -Quiet)) { throw "Portable EXE is missing DcmGet Web index" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*webui.*app\.css" -Quiet)) { throw "Portable EXE is missing DcmGet Web styles" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*webui.*app\.js" -Quiet)) { throw "Portable EXE is missing DcmGet Web application" }
          if (-not (Select-String -Path $archiveListing -Pattern "fastapi" -Quiet)) { throw "Portable EXE is missing FastAPI" }
          if (-not (Select-String -Path $archiveListing -Pattern "dcmget.*nicegui_ui" -Quiet)) { throw "Portable EXE is missing DcmGet NiceGUI workspace" }
          if (-not (Select-String -Path $archiveListing -Pattern "nicegui.*templates.*index\.html" -Quiet)) { throw "Portable EXE is missing NiceGUI templates" }
          if (-not (Select-String -Path $archiveListing -Pattern "nicegui.*static" -Quiet)) { throw "Portable EXE is missing NiceGUI static assets" }
          if (-not (Select-String -Path $archiveListing -Pattern "webview" -Quiet)) { throw "Portable EXE is missing pywebview" }
          if (-not (Select-String -Path $archiveListing -Pattern "uvicorn" -Quiet)) { throw "Portable EXE is missing Uvicorn" }
          if (-not (Select-String -Path $archiveListing -Pattern "ohif-3\.12\.6.*index\.html" -Quiet)) { throw "Portable EXE is missing OHIF index" }
          if (-not (Select-String -Path $archiveListing -Pattern "pynetdicom" -Quiet)) { throw "Portable EXE is missing pynetdicom compatibility modules" }
          if (-not (Select-String -Path $archiveListing -Pattern "DCMGET_PORTABLE_RUNTIME\.json" -Quiet)) { throw "Portable EXE is missing the stable DCMTK runtime manifest" }

      - name: Smoke test standalone PDI server
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP "dcmget-pdi-server-fixture"
          New-Item -ItemType Directory -Force "$fixture/VIEWER/OHIF", "$fixture/VIEWER/.dcmget", "$fixture/DICOM" | Out-Null
          Set-Content "$fixture/VIEWER/OHIF/index.html" "OHIF SERVER SMOKE" -Encoding utf8NoBOM
          $viewerDigest = (Get-FileHash "$fixture/VIEWER/OHIF/index.html" -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            "$fixture/VIEWER/OHIF/DCMGET_PAYLOAD.SHA256",
            "$viewerDigest  index.html`n",
            [Text.UTF8Encoding]::new($false)
          )
          Set-Content "$fixture/VIEWER/.dcmget/index" '{"studies":[{"series":[{"instances":[{"metadata":{},"url":"dicomweb:/DICOM/I000001"}]}]}]}' -Encoding utf8NoBOM
          [IO.File]::WriteAllBytes("$fixture/DICOM/I000001", [byte[]](0..9))

          $listener = [Net.Sockets.TcpListener]::new([Net.IPAddress]::Loopback, 0)
          $listener.Start()
          $port = ([Net.IPEndPoint]$listener.LocalEndpoint).Port
          $listener.Stop()
          $server = (Resolve-Path "build/windows/dist/DcmGetPdiServer.exe").Path
          $token = (python -c "import secrets; print(secrets.token_urlsafe(32))").Trim()
          # Do not pass --quiet here: the exported OPEN_VIEWER.exe is a
          # windowed process without stderr, which is the real double-click path.
          $process = Start-Process $server -ArgumentList @("--root", "`"$fixture`"", "--port", "$port", "--session-token", $token, "--no-browser") -PassThru
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 40; $attempt++) {
              if ($process.HasExited) { throw "PDI server exited with code $($process.ExitCode)" }
              try {
                $response = Invoke-WebRequest -Method Head "http://127.0.0.1:$port/ready/$token"
                if ($response.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              } catch { Start-Sleep -Milliseconds 250 }
            }
            if (-not $ready) { throw "PDI server did not become ready" }
            $session = [Microsoft.PowerShell.Commands.WebRequestSession]::new()
            $viewer = Invoke-WebRequest "http://127.0.0.1:$port/open/$token" -WebSession $session
            if ($viewer.StatusCode -ne 200 -or $viewer.Content -notmatch "OHIF SERVER SMOKE") { throw "PDI directory viewer request failed" }
            $manifest = Invoke-WebRequest "http://127.0.0.1:$port/api/studies" -WebSession $session
            if ($manifest.StatusCode -ne 200 -or $manifest.Content -notmatch '"studies"') { throw "PDI manifest request failed" }
            $range = Invoke-WebRequest "http://127.0.0.1:$port/DICOM/I000001" -WebSession $session -Headers @{ Range = "bytes=2-5" }
            if ($range.StatusCode -ne 206 -or $range.Headers["Content-Range"] -notmatch "bytes 2-5/10") { throw "PDI byte-range request failed" }
          } finally {
            if (-not $process.HasExited) {
              taskkill /PID $process.Id /T /F | Out-Null
            }
          }

      - name: Download VC++ Runtime for installer
        shell: pwsh
        run: |
          Invoke-WebRequest "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile build/windows/vc_redist.x64.exe
          $signature = Get-AuthenticodeSignature build/windows/vc_redist.x64.exe
          if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Subject -notmatch "Microsoft") {
            throw "VC++ Runtime Authenticode validation failed: $($signature.Status) $($signature.SignerCertificate.Subject)"
          }

      - name: Smoke test unpacked application
        shell: pwsh
        run: |
          $exe = "build/windows/dist/DcmGet/DcmGet.exe"
          $process = Start-Process $exe -ArgumentList "--self-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Unpacked self-test failed with code $($process.ExitCode)" }
          $config = Join-Path $env:RUNNER_TEMP "dcmget-unpacked-web-self-test.json"
          $web = Start-Process $exe -ArgumentList @("--web-self-test", "--config", $config) -Wait -PassThru
          if ($web.ExitCode -ne 0) {
            $diagnostic = Get-ChildItem (Join-Path $env:LOCALAPPDATA "DcmGet\logs") -Filter "dcmget-diagnostics-*.log" -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime | Select-Object -Last 1
            if ($diagnostic) { Get-Content $diagnostic.FullName -Raw }
            throw "Unpacked Web self-test failed with code $($web.ExitCode)"
          }

      - name: Smoke test portable application
        shell: pwsh
        run: |
          $portable = (Resolve-Path "release/windows/DcmGet-${{ inputs.version }}-windows-x64-portable.exe").Path
          $runtimeRoot = Join-Path $env:LOCALAPPDATA "DcmGet\runtime\dcmtk"
          if (Test-Path $runtimeRoot) { Remove-Item $runtimeRoot -Recurse -Force }
          $reportA = Join-Path $env:RUNNER_TEMP "dcmget-portable-self-test-a.json"
          $reportB = Join-Path $env:RUNNER_TEMP "dcmget-portable-self-test-b.json"
          Remove-Item $reportA, $reportB -Force -ErrorAction SilentlyContinue

          $first = Start-Process $portable -ArgumentList @("--self-test", "--self-test-report", "`"$reportA`"") -PassThru
          $second = Start-Process $portable -ArgumentList @("--self-test", "--self-test-report", "`"$reportB`"") -PassThru
          $first.WaitForExit()
          $second.WaitForExit()
          if ($first.ExitCode -ne 0) { throw "First portable self-test failed with code $($first.ExitCode)" }
          if ($second.ExitCode -ne 0) { throw "Second portable self-test failed with code $($second.ExitCode)" }
          if (-not (Test-Path $reportA -PathType Leaf) -or -not (Test-Path $reportB -PathType Leaf)) {
            throw "Portable self-test did not write both runtime reports"
          }

          $firstReport = Get-Content $reportA -Raw | ConvertFrom-Json
          $secondReport = Get-Content $reportB -Raw | ConvertFrom-Json
          if (-not [String]::Equals($firstReport.storescp, $secondReport.storescp, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Simultaneous portable launches resolved different storescp paths"
          }
          if (-not [String]::Equals($firstReport.portable_dcmtk_bin, $secondReport.portable_dcmtk_bin, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Simultaneous portable launches published different DCMTK directories"
          }
          $stableRoot = [IO.Path]::GetFullPath((Resolve-Path $runtimeRoot).Path)
          $storescp = [IO.Path]::GetFullPath([string]$firstReport.storescp)
          $portableBin = [IO.Path]::GetFullPath([string]$firstReport.portable_dcmtk_bin)
          if (-not $storescp.StartsWith($stableRoot + [IO.Path]::DirectorySeparatorChar, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Portable storescp is outside the per-user stable runtime: $storescp"
          }
          if ($storescp -match '(?i)[\\/]_MEI[^\\/]*[\\/]') {
            throw "Portable storescp still runs from PyInstaller temporary extraction: $storescp"
          }
          if (-not [String]::Equals((Split-Path $storescp -Parent), $portableBin, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Portable storescp does not come from the reported stable bin directory"
          }
          if (-not (Test-Path $storescp -PathType Leaf)) { throw "Stable portable storescp does not exist" }
          $expectedDcmtkBin = @(
            "movescu.exe", "storescp.exe", "dcmmkdir.exe", "dcmdump.exe",
            "dcmdata.dll", "dcmimage.dll", "dcmimgle.dll", "dcmjpeg.dll",
            "dcmnet.dll", "dcmtls.dll", "ijg8.dll", "ijg12.dll", "ijg16.dll",
            "oficonv.dll", "oflog.dll", "ofstd.dll"
          ) | Sort-Object
          $portableDcmtkBin = @(Get-ChildItem $portableBin -File | ForEach-Object Name | Sort-Object)
          $portableDifference = @(Compare-Object $expectedDcmtkBin $portableDcmtkBin)
          if ($portableDifference.Count -ne 0) {
            throw "Portable DCMTK bin allowlist mismatch: $($portableDifference | Out-String)"
          }
          $published = @(Get-ChildItem $runtimeRoot -Directory | Where-Object { $_.Name -notlike ".*" })
          if ($published.Count -ne 1) { throw "Expected one atomically published portable runtime, found $($published.Count)" }
          if (@(Get-ChildItem $runtimeRoot -Directory -Force | Where-Object { $_.Name -like ".*.tmp-*" }).Count -ne 0) {
            throw "Portable runtime left a temporary publish directory"
          }

          $config = Join-Path $env:RUNNER_TEMP "dcmget-portable-web-self-test.json"
          $web = Start-Process $portable -ArgumentList @("--web-self-test", "--config", $config) -Wait -PassThru
          if ($web.ExitCode -ne 0) {
            $diagnostic = Get-ChildItem (Join-Path $env:LOCALAPPDATA "DcmGet\logs") -Filter "dcmget-diagnostics-*.log" -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime | Select-Object -Last 1
            if ($diagnostic) { Get-Content $diagnostic.FullName -Raw }
            throw "Portable Web self-test failed with code $($web.ExitCode)"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --yes --no-progress
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe was not installed" }

      - name: Prepare Chinese installer language
        shell: pwsh
        run: |
          $language = "build/windows/ChineseSimplified.isl"
          Invoke-WebRequest "https://raw.githubusercontent.com/jrsoftware/issrc/929fc4e164798bd84fec385a1dc8a899a0d4a100/Files/Languages/ChineseSimplified.isl" -OutFile $language
          $expected = "6753be2c5e2740d859900fd902824db2ec568da5c5b52486524c9762d778b0b0"
          $actual = (Get-FileHash $language -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Chinese language file checksum mismatch: $actual" }

      - name: Build pinned 2.6.1 upgrade baseline installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $baselineRoot = (Resolve-Path "upgrade-baseline").Path
          $baselineRuntime = Join-Path $baselineRoot ".runtime"
          New-Item -ItemType Directory -Force $baselineRuntime | Out-Null
          Copy-Item -LiteralPath ".runtime\dcmtk" -Destination $baselineRuntime -Recurse -Force
          $baselineOhif = Join-Path $baselineRuntime "ohif"
          New-Item -ItemType Directory -Force $baselineOhif | Out-Null
          Copy-Item -LiteralPath ".runtime\ohif\cache" -Destination (Join-Path $baselineOhif "cache") -Recurse -Force
          Push-Location $baselineRoot
          try {
            python scripts/prepare_ohif.py --offline
            if ($LASTEXITCODE -ne 0) { throw "Pinned 2.6.1 OHIF preparation failed with exit code $LASTEXITCODE" }
            python scripts/build_windows.py --version 2.6.1
            if ($LASTEXITCODE -ne 0) { throw "Pinned 2.6.1 application build failed with exit code $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

          $source = (Resolve-Path (Join-Path $baselineRoot "build\windows\dist\DcmGet")).Path
          $icon = (Resolve-Path (Join-Path $baselineRoot "build\windows\dcmget.ico")).Path
          $license = (Resolve-Path (Join-Path $baselineRoot "LICENSE")).Path
          $redist = (Resolve-Path "build/windows/vc_redist.x64.exe").Path
          $language = (Resolve-Path "build/windows/ChineseSimplified.isl").Path
          $fixture = (New-Item -ItemType Directory -Force "build/windows/upgrade-fixture").FullName
          $installerScript = Join-Path $baselineRoot "packaging\windows\dcmget.iss"
          & $iscc "/DAppVersion=2.6.1" "/DSourceDir=$source" "/DReleaseDir=$fixture" "/DBuildIcon=$icon" "/DLicenseFile=$license" "/DVCRedistPath=$redist" "/DChineseLanguageFile=$language" $installerScript
          if ($LASTEXITCODE -ne 0) { throw "Pinned 2.6.1 installer compilation failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path (Join-Path $fixture "DcmGet-2.6.1-Setup-x64.exe") -PathType Leaf)) { throw "Pinned 2.6.1 installer is missing" }
          Remove-Item (Join-Path $baselineRoot "build") -Recurse -Force
          Remove-Item (Join-Path $baselineRoot "release") -Recurse -Force
          Remove-Item $baselineRuntime -Recurse -Force

      - name: Build current one-click installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $source = (Resolve-Path "build/windows/dist/DcmGet").Path
          $release = (Resolve-Path "release/windows").Path
          $icon = (Resolve-Path "build/windows/dcmget.ico").Path
          $license = (Resolve-Path "LICENSE").Path
          $redist = (Resolve-Path "build/windows/vc_redist.x64.exe").Path
          $language = (Resolve-Path "build/windows/ChineseSimplified.isl").Path
          $winsw = (Resolve-Path ".runtime/winsw/v2.12.0/WinSW-x64.exe").Path
          & $iscc "/DAppVersion=${{ inputs.version }}" "/DSourceDir=$source" "/DReleaseDir=$release" "/DBuildIcon=$icon" "/DLicenseFile=$license" "/DVCRedistPath=$redist" "/DChineseLanguageFile=$language" "/DWinSWPath=$winsw" "packaging/windows/dcmget.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }

      - name: Sign installer before testing exact release artifact
        shell: pwsh
        run: |
          $env:DCMGET_SETUP_PATH = (Resolve-Path "release/windows/DcmGet-${{ inputs.version }}-Setup-x64.exe").Path
          python -c "import os; from pathlib import Path; from scripts.build_windows import sign_windows_payloads; sign_windows_payloads([Path(os.environ['DCMGET_SETUP_PATH'])])"

      - name: Silent install, in-place upgrade and uninstall test
        shell: pwsh
        run: |
          $baseline = (Resolve-Path "build/windows/upgrade-fixture/DcmGet-2.6.1-Setup-x64.exe").Path
          $setup = (Resolve-Path "release/windows/DcmGet-${{ inputs.version }}-Setup-x64.exe").Path
          $installDir = Join-Path $env:RUNNER_TEMP "DcmGetInstalled"
          $upgradeDicomDir = Join-Path $env:RUNNER_TEMP "DcmGetUpgradeDicom"
          $downloadSentinelPath = Join-Path $upgradeDicomDir "keep-download.dcm"
          $configDir = Join-Path $env:APPDATA "DcmGet"
          $configPath = Join-Path $configDir "config.json"
          $licensePath = Join-Path $configDir "license.lic"
          $trialPath = Join-Path $configDir "trial.json"
          $trialAnchorPath = Join-Path $env:ProgramData "DcmGet\.trial-anchor"
          $uninstallRoot = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall"
          $serviceName = "kayisoft-dcmget"

          function Wait-DcmGetServiceStatus([string]$expected, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
              if ($null -ne $service -and $service.Status.ToString() -eq $expected) { return $service }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            $actual = if ($null -eq $service) { "missing" } else { $service.Status.ToString() }
            throw "Service $serviceName status is $actual, expected $expected"
          }

          function Wait-DcmGetProfile([int]$profileNumber, [int]$webPort, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $process = @(
                Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                  Where-Object { ([string]$_.CommandLine) -match "--profile\s+$profileNumber(?:\s|$)" }
              )
              if ($process.Count -eq 1) {
                try {
                  $client = [Net.Sockets.TcpClient]::new()
                  $client.Connect("127.0.0.1", $webPort)
                  $client.Dispose()
                  return $process[0]
                } catch {
                  if ($null -ne $client) { $client.Dispose() }
                }
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            throw "Profile $profileNumber did not become ready on Web port $webPort"
          }

          function Test-TcpPortOpen([int]$port) {
            $client = [Net.Sockets.TcpClient]::new()
            try {
              $pending = $client.ConnectAsync("127.0.0.1", $port)
              return $pending.Wait(500) -and $client.Connected
            } catch { return $false }
            finally { $client.Dispose() }
          }

          function Assert-FixedDcmGetPortAvailable([int]$port, [string]$purpose) {
            $listeners = @(Get-NetTCPConnection -State Listen -LocalPort $port -ErrorAction SilentlyContinue)
            if ($listeners.Count -eq 0) { return }
            $owners = @(
              $listeners | ForEach-Object {
                Get-CimInstance Win32_Process -Filter "ProcessId = $($_.OwningProcess)" -ErrorAction SilentlyContinue
              } | Select-Object ProcessId, ParentProcessId, Name, ExecutablePath, CommandLine
            )
            $owners | Format-List | Out-String | Write-Host
            throw "Fixed DcmGet $purpose port $port is occupied before installer testing"
          }

          Remove-Item $configDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $upgradeDicomDir -Recurse -Force -ErrorAction SilentlyContinue
          Assert-FixedDcmGetPortAvailable 8786 "management"
          Assert-FixedDcmGetPortAvailable 8787 "Profile 1"

          $install = Start-Process $baseline -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$installDir") -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Baseline installer failed with exit code $($install.ExitCode)" }
          $baselineRecords = @(Get-ChildItem $uninstallRoot | ForEach-Object { Get-ItemProperty $_.PSPath } | Where-Object { $_.DisplayName -eq "DcmGet" })
          if ($baselineRecords.Count -ne 1) { throw "Expected one 2.6.1 uninstall record, found $($baselineRecords.Count)" }
          if ($baselineRecords[0].DisplayVersion -ne "2.6.1") { throw "Baseline installed version is $($baselineRecords[0].DisplayVersion), expected 2.6.1" }
          if ($baselineRecords[0].InstallLocation.TrimEnd('\') -ne $installDir.TrimEnd('\')) { throw "Baseline installation directory is incorrect" }
          New-Item -ItemType Directory -Force $configDir | Out-Null
          New-Item -ItemType Directory -Force $upgradeDicomDir | Out-Null
          $upgradeWebPort = 8787
          $upgradeConfig = [ordered]@{
            config_version = 2
            pacs_server_ip = "upgrade-preserve.invalid"
            storage_port = 16666
            web_port = $upgradeWebPort
            dicom_destination_folder = $upgradeDicomDir
          }
          [IO.File]::WriteAllText($configPath, ($upgradeConfig | ConvertTo-Json -Compress), [Text.UTF8Encoding]::new($false))
          [IO.File]::WriteAllText($downloadSentinelPath, "download-result-sentinel", [Text.UTF8Encoding]::new($false))
          Set-Content $licensePath "upgrade-license-sentinel"
          python -c "from dcmget.licensing import consume_trial; consume_trial()"
          if ($LASTEXITCODE -ne 0) { throw "Could not create valid trial state" }
          Set-Content "$installDir/_internal/obsolete-upgrade-marker.txt" "remove-me"
          $configHash = (Get-FileHash $configPath -Algorithm SHA256).Hash
          $licenseHash = (Get-FileHash $licensePath -Algorithm SHA256).Hash
          $trialHash = (Get-FileHash $trialPath -Algorithm SHA256).Hash
          $trialAnchorHash = (Get-FileHash $trialAnchorPath -Algorithm SHA256).Hash

          # Replace the three inactive helper executables with a deterministic long-running
          # fixture.  The upgrade must end these processes and their ping children,
          # while preserving the same-named process outside the installation root.
          # DcmGet.exe itself is verified below while it is genuinely service-hosted;
          # never overwrite an executable that the installed service may be running.
          $managedExecutablePaths = @(
            (Join-Path $installDir "_internal\DcmGetPdiServer.exe"),
            (Join-Path $installDir "_internal\.runtime\dcmtk\windows-x86_64\dcmtk-3.7.0-win64-dynamic\bin\storescp.exe"),
            (Join-Path $installDir "_internal\.runtime\dcmtk\windows-x86_64\dcmtk-3.7.0-win64-dynamic\bin\movescu.exe")
          )
          foreach ($managedPath in $managedExecutablePaths) {
            if (-not (Test-Path $managedPath -PathType Leaf)) { throw "Upgrade process fixture is missing: $managedPath" }
            Copy-Item "$env:SystemRoot\System32\cmd.exe" $managedPath -Force
          }
          $managedProcesses = @(
            $managedExecutablePaths | ForEach-Object {
              Start-Process $_ -ArgumentList @("/d", "/c", "ping.exe -t 127.0.0.1 >NUL") -PassThru
            }
          )
          $outsideRoot = Join-Path $env:RUNNER_TEMP "DcmGetOutsideProcess"
          New-Item -ItemType Directory -Force $outsideRoot | Out-Null
          $outsideTool = Join-Path $outsideRoot "storescp.exe"
          Copy-Item "$env:SystemRoot\System32\cmd.exe" $outsideTool -Force
          $outsideProcess = Start-Process $outsideTool -ArgumentList @("/d", "/c", "ping.exe -t 127.0.0.1 >NUL") -PassThru
          Start-Sleep -Seconds 1
          $managedChildIds = @()
          foreach ($managedProcess in $managedProcesses) {
            $managedProcess.Refresh()
            if ($managedProcess.HasExited) { throw "Managed process fixture exited before upgrade: $($managedProcess.Id)" }
            $children = @(Get-CimInstance Win32_Process -Filter "ParentProcessId = $($managedProcess.Id)")
            if ($children.Count -lt 1) { throw "Managed process fixture has no child: $($managedProcess.Id)" }
            $managedChildIds += @($children | ForEach-Object ProcessId)
          }
          $outsideProcess.Refresh()
          if ($outsideProcess.HasExited) { throw "Outside process fixture exited before upgrade" }

          $upgrade = Start-Process $setup -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/TASKS=desktopicon") -Wait -PassThru
          if ($upgrade.ExitCode -ne 0) { throw "Upgrade installer failed with exit code $($upgrade.ExitCode)" }
          foreach ($managedProcess in $managedProcesses) {
            $managedProcess.Refresh()
            if (-not $managedProcess.HasExited) { throw "Installer did not stop managed process $($managedProcess.Id)" }
          }
          foreach ($childId in $managedChildIds) {
            if (Get-Process -Id $childId -ErrorAction SilentlyContinue) { throw "Installer left a managed child process running: $childId" }
          }
          $outsideProcess.Refresh()
          if ($outsideProcess.HasExited) { throw "Installer killed same-named process outside install directory" }
          taskkill /PID $outsideProcess.Id /T /F | Out-Null
          Remove-Item $outsideRoot -Recurse -Force
          if (-not (Test-Path "$installDir/DcmGet.exe")) { throw "Installed DcmGet.exe is missing" }
          if (-not (Test-Path "$env:LOCALAPPDATA\DcmGet\logs")) { throw "Diagnostic log directory is missing" }
          $diagnosticShortcuts = @(
            (Join-Path $env:ProgramData "Microsoft\Windows\Start Menu\Programs\DcmGet 诊断日志.lnk"),
            (Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\DcmGet 诊断日志.lnk")
          )
          if (-not ($diagnosticShortcuts | Where-Object { Test-Path $_ })) { throw "Diagnostic log shortcut is missing" }
          $installedDcmtkBin = (Resolve-Path "$installDir/_internal/.runtime/dcmtk/windows-x86_64/dcmtk-3.7.0-win64-dynamic/bin").Path
          $expectedDcmtkBin = @(
            "movescu.exe", "storescp.exe", "dcmmkdir.exe", "dcmdump.exe",
            "dcmdata.dll", "dcmimage.dll", "dcmimgle.dll", "dcmjpeg.dll",
            "dcmnet.dll", "dcmtls.dll", "ijg8.dll", "ijg12.dll", "ijg16.dll",
            "oficonv.dll", "oflog.dll", "ofstd.dll"
          ) | Sort-Object
          $installedDcmtkFiles = @(Get-ChildItem $installedDcmtkBin -File | ForEach-Object Name | Sort-Object)
          $installedDcmtkDifference = @(Compare-Object $expectedDcmtkBin $installedDcmtkFiles)
          if ($installedDcmtkDifference.Count -ne 0) {
            throw "Installed DCMTK bin allowlist mismatch: $($installedDcmtkDifference | Out-String)"
          }
          $resourceRoot = Join-Path $installDir "_internal"
          @("static", "templates") | ForEach-Object {
            if (-not (Test-Path (Join-Path "$resourceRoot/nicegui" $_) -PathType Container)) { throw "Installed NiceGUI resource is missing: $_" }
          }
          $webui = Join-Path $resourceRoot "dcmget\webui"
          @("index.html", "app.css", "app.js") | ForEach-Object {
            if (-not (Test-Path (Join-Path $webui $_) -PathType Leaf)) { throw "Installed DcmGet Web resource is missing: $_" }
          }
          $ohif = Join-Path $resourceRoot ".runtime\ohif\ohif-3.12.6"
          if (-not (Test-Path (Join-Path $resourceRoot "DcmGetPdiServer.exe") -PathType Leaf)) { throw "Installed PDI local server is missing" }
          if (-not (Test-Path (Join-Path $resourceRoot "dcmget\pdi_server.py") -PathType Leaf)) { throw "Installed portable PDI server script is missing" }
          if (-not (Test-Path (Join-Path $resourceRoot "dcmget\architecture.py") -PathType Leaf)) { throw "Installed PDI architecture guard is missing" }
          @("index.html", "app-config.js", "init-service-worker.js", "LICENSE-OHIF.txt", "THIRD_PARTY-OHIF.md", "DCMGET_OHIF_PAYLOAD.json", "DCMGET_PAYLOAD.SHA256") | ForEach-Object {
            if (-not (Test-Path (Join-Path $ohif $_) -PathType Leaf)) { throw "Installed OHIF resource is missing: $_" }
          }
          if (Test-Path "$installDir/_internal/obsolete-upgrade-marker.txt") { throw "Upgrade did not remove obsolete runtime files" }
          if ((Get-FileHash $configPath -Algorithm SHA256).Hash -ne $configHash) { throw "Upgrade changed the existing user configuration" }
          if ((Get-FileHash $licensePath -Algorithm SHA256).Hash -ne $licenseHash) { throw "Upgrade changed the existing license" }
          if ((Get-FileHash $trialPath -Algorithm SHA256).Hash -ne $trialHash) { throw "Upgrade changed the existing trial state" }
          if ((Get-FileHash $trialAnchorPath -Algorithm SHA256).Hash -ne $trialAnchorHash) { throw "Upgrade changed the machine trial anchor" }

          $records = @(Get-ChildItem $uninstallRoot | ForEach-Object { Get-ItemProperty $_.PSPath } | Where-Object { $_.DisplayName -eq "DcmGet" })
          if ($records.Count -ne 1) { throw "Expected one DcmGet uninstall record, found $($records.Count)" }
          if ($records[0].DisplayVersion -ne "${{ inputs.version }}") { throw "Installed version is $($records[0].DisplayVersion)" }
          if ($records[0].InstallLocation.TrimEnd('\') -ne $installDir.TrimEnd('\')) { throw "Upgrade changed the installation directory" }

          function Assert-DcmGetFirewallRule([string]$displayName, [string]$expectedProgram) {
            $rules = @(Get-NetFirewallRule -DisplayName $displayName -ErrorAction Stop)
            if ($rules.Count -ne 1) { throw "Expected exactly one '$displayName' firewall rule, found $($rules.Count)" }
            $rule = $rules[0]
            if ($rule.Direction.ToString() -ne "Inbound" -or $rule.Action.ToString() -ne "Allow" -or $rule.Enabled.ToString() -ne "True" -or $rule.EdgeTraversalPolicy.ToString() -ne "Block") {
              throw "Firewall rule '$displayName' must be enabled inbound allow with edge traversal blocked"
            }
            $portFilters = @($rule | Get-NetFirewallPortFilter)
            if ($portFilters.Count -ne 1 -or $portFilters[0].Protocol -ne "TCP" -or $portFilters[0].LocalPort.ToString() -ne "Any") {
              throw "Firewall rule '$displayName' must allow the configured TCP port"
            }
            $applicationFilters = @($rule | Get-NetFirewallApplicationFilter)
            if ($applicationFilters.Count -ne 1) { throw "Expected one '$displayName' firewall application filter, found $($applicationFilters.Count)" }
            $configuredProgram = [Environment]::ExpandEnvironmentVariables($applicationFilters[0].Program.Trim('"'))
            $actualProgram = (Resolve-Path -LiteralPath $configuredProgram -ErrorAction Stop).ProviderPath
            if (-not $actualProgram.Equals($expectedProgram, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Firewall program for '$displayName' is '$actualProgram', expected '$expectedProgram'"
            }
            $profileNames = @($rule.Profile.ToString().Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ })
            if ($profileNames.Count -ne 2 -or $profileNames -notcontains "Domain" -or $profileNames -notcontains "Private") {
              throw "Firewall profiles for '$displayName' must be exactly Domain and Private, found '$($rule.Profile)'"
            }
          }

          if (Get-NetFirewallRule -DisplayName "DcmGet storescp TCP" -ErrorAction SilentlyContinue) { throw "Upgrade left the legacy storescp program rule behind" }
          if (Get-NetFirewallRule -DisplayName "DcmGet storescp TCP 6666" -ErrorAction SilentlyContinue) { throw "Upgrade left the legacy TCP 6666 firewall rule behind" }
          $expectedReceiver = (Resolve-Path -LiteralPath (Join-Path $installDir "_internal\.runtime\dcmtk\windows-x86_64\dcmtk-3.7.0-win64-dynamic\bin\storescp.exe") -ErrorAction Stop).ProviderPath
          $expectedWeb = (Resolve-Path -LiteralPath (Join-Path $installDir "DcmGet.exe") -ErrorAction Stop).ProviderPath
          Assert-DcmGetFirewallRule "DcmGet Receiver TCP" $expectedReceiver
          Assert-DcmGetFirewallRule "DcmGet Web TCP" $expectedWeb

      - name: Windows service dynamic Profile adoption test
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "DcmGetInstalled"
          $configDir = Join-Path $env:APPDATA "DcmGet"
          $serviceName = "kayisoft-dcmget"
          $profile1ConfigPath = Join-Path $configDir "instances\i1\config.json"
          $profile2Directory = Join-Path $configDir "instances\i2"
          $profile2ConfigPath = Join-Path $profile2Directory "config.json"
          $runtimeStatePath = Join-Path $env:LOCALAPPDATA "DcmGet\management\profile-runtime.json"

          function Get-DcmGetProfileProcesses([int]$profileNumber) {
            @(
              Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                Where-Object {
                  ([string]$_.ExecutablePath).Equals((Join-Path $installDir "DcmGet.exe"), [StringComparison]::OrdinalIgnoreCase) -and
                  ([string]$_.CommandLine) -match "--profile\s+$profileNumber(?:\s|$)"
                }
            )
          }

          function Wait-DcmGetProfile([int]$profileNumber, [int]$webPort, [int]$excludedProcessId = 0, [int]$timeoutSeconds = 40) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $process = @(Get-DcmGetProfileProcesses $profileNumber | Where-Object { $_.ProcessId -ne $excludedProcessId })
              if ($process.Count -eq 1) {
                try {
                  $client = [Net.Sockets.TcpClient]::new()
                  $client.Connect("127.0.0.1", $webPort)
                  $client.Dispose()
                  return $process[0]
                } catch {
                  if ($null -ne $client) { $client.Dispose() }
                }
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            Get-CimInstance Win32_Process -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -in @("DcmGet.exe", "powershell.exe", "kayisoft-dcmget.exe") } |
              Select-Object ProcessId, ParentProcessId, Name, ExecutablePath, CommandLine |
              Format-List | Out-String | Write-Host
            $serviceLogDirectory = Join-Path $env:LOCALAPPDATA "DcmGet\logs\service"
            Get-ChildItem -LiteralPath $serviceLogDirectory -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime |
              Select-Object -Last 4 |
              ForEach-Object {
                Write-Host "--- service log: $($_.FullName) ---"
                Get-Content -LiteralPath $_.FullName -Tail 240 -ErrorAction SilentlyContinue | Write-Host
              }
            throw "Profile $profileNumber did not become ready on Web port $webPort"
          }

          function Assert-ProfileNotRunning([int]$profileNumber, [int]$webPort, [string]$message) {
            $processes = @(Get-DcmGetProfileProcesses $profileNumber)
            $client = [Net.Sockets.TcpClient]::new()
            try {
              $pending = $client.ConnectAsync("127.0.0.1", $webPort)
              $portOpen = $pending.Wait(500) -and $client.Connected
            } catch { $portOpen = $false }
            finally { $client.Dispose() }
            if ($processes.Count -ne 0 -or $portOpen) { throw $message }
          }

          function Wait-ProfileStopped([int]$profileNumber, [int]$webPort, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              if (@(Get-DcmGetProfileProcesses $profileNumber).Count -eq 0) {
                try {
                  $client = [Net.Sockets.TcpClient]::new()
                  $pending = $client.ConnectAsync("127.0.0.1", $webPort)
                  if (-not ($pending.Wait(500) -and $client.Connected)) { return }
                } catch { return }
                finally { if ($null -ne $client) { $client.Dispose() } }
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            throw "Deleted Profile $profileNumber remained running on Web port $webPort"
          }

          function Get-FreeTcpPort {
            $listener = [Net.Sockets.TcpListener]::new([Net.IPAddress]::Loopback, 0)
            $listener.Start()
            try { return ([Net.IPEndPoint]$listener.LocalEndpoint).Port }
            finally { $listener.Stop() }
          }

          function Write-ProfileConfigAtomically([string]$content) {
            $pendingPath = Join-Path $profile2Directory ".config.json.pending"
            Remove-Item $pendingPath -Force -ErrorAction SilentlyContinue
            [IO.File]::WriteAllText($pendingPath, $content, [Text.UTF8Encoding]::new($false))
            [IO.File]::Move($pendingPath, $profile2ConfigPath)
          }

          function Set-DesiredProfiles([int[]]$profileNumbers) {
            $directory = Split-Path -Parent $runtimeStatePath
            New-Item -ItemType Directory -Force $directory | Out-Null
            $pendingPath = Join-Path $directory ".profile-runtime.json.pending"
            $payload = [ordered]@{
              schema = "dcmget-profile-runtime"
              version = 1
              desired_running_profiles = @($profileNumbers | Sort-Object -Unique)
            } | ConvertTo-Json -Compress
            [IO.File]::WriteAllText($pendingPath, "$payload`n", [Text.UTF8Encoding]::new($false))
            Move-Item -LiteralPath $pendingPath -Destination $runtimeStatePath -Force
          }

          function Start-AdoptAndRestartProfile([int]$webPort) {
            Set-DesiredProfiles @(1, 2)
            $running = Wait-DcmGetProfile 2 $webPort
            Start-Sleep -Seconds 4
            & "$env:SystemRoot\System32\taskkill.exe" /PID ([string]$running.ProcessId) /T /F | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "Could not terminate adopted Profile 2 process" }
            $restarted = Wait-DcmGetProfile 2 $webPort ([int]$running.ProcessId)
            if ($restarted.ProcessId -eq $running.ProcessId) { throw "Service host did not restart adopted Profile 2" }
            return $restarted
          }

          if ((Get-Service -Name $serviceName -ErrorAction Stop).Status -ne "Running") { throw "DcmGet service is not running before dynamic Profile test" }
          for ($attempt = 0; $attempt -lt 120 -and -not (Test-Path $profile1ConfigPath -PathType Leaf); $attempt++) {
            Start-Sleep -Milliseconds 250
          }
          if (-not (Test-Path $profile1ConfigPath -PathType Leaf)) { throw "Profile 1 config is missing before dynamic Profile test" }

          Remove-Item $profile2Directory -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $profile2Directory | Out-Null
          $profile2StoragePort = Get-FreeTcpPort
          do { $profile2WebPort = Get-FreeTcpPort } while ($profile2WebPort -eq $profile2StoragePort)
          $profile2Config = Get-Content $profile1ConfigPath -Raw | ConvertFrom-Json
          $profile2Config.storage_port = $profile2StoragePort
          $profile2Config.web_port = $profile2WebPort
          $profile2Config.storage_ae_title = "DCMGET2"
          $profile2Config.dicom_destination_folder = Join-Path $env:RUNNER_TEMP "DcmGetProfile2Output"
          $profile2ConfigJson = $profile2Config | ConvertTo-Json -Depth 20

          [IO.File]::WriteAllText((Join-Path $profile2Directory ".config.json.pending"), $profile2ConfigJson, [Text.UTF8Encoding]::new($false))
          Start-Sleep -Seconds 4
          Assert-ProfileNotRunning 2 $profile2WebPort "Service host adopted Profile 2 before config.json was complete"
          [IO.File]::Move((Join-Path $profile2Directory ".config.json.pending"), $profile2ConfigPath)
          Start-Sleep -Seconds 4
          Assert-ProfileNotRunning 2 $profile2WebPort "Service host auto-started a cloned Profile before explicit start"

          $profile2Process = Start-AdoptAndRestartProfile $profile2WebPort
          Remove-Item $profile2ConfigPath -Force
          Wait-ProfileStopped 2 $profile2WebPort

          Write-ProfileConfigAtomically $profile2ConfigJson
          $profile2Process = Wait-DcmGetProfile 2 $profile2WebPort
          Set-DesiredProfiles @(1)
          Wait-ProfileStopped 2 $profile2WebPort
          Start-Sleep -Seconds 2
          Assert-ProfileNotRunning 2 $profile2WebPort "Service host restarted a Profile after the operator stopped it"
          $profile2Process = Start-AdoptAndRestartProfile $profile2WebPort
          if (-not (Test-Path $profile2ConfigPath -PathType Leaf)) { throw "Dynamic Profile test lost Profile 2 config" }

      - name: Windows service lifecycle, upgrade-state and uninstall test
        shell: pwsh
        run: |
          $setup = (Resolve-Path "release/windows/DcmGet-${{ inputs.version }}-Setup-x64.exe").Path
          $installDir = Join-Path $env:RUNNER_TEMP "DcmGetInstalled"
          $configDir = Join-Path $env:APPDATA "DcmGet"
          $configPath = Join-Path $configDir "config.json"
          $licensePath = Join-Path $configDir "license.lic"
          $trialPath = Join-Path $configDir "trial.json"
          $trialAnchorPath = Join-Path $env:ProgramData "DcmGet\.trial-anchor"
          $serviceName = "kayisoft-dcmget"
          $managementPort = 8786
          $upgradeWebPort = [int]((Get-Content $configPath -Raw | ConvertFrom-Json).web_port)
          $configHash = (Get-FileHash $configPath -Algorithm SHA256).Hash
          $licenseHash = (Get-FileHash $licensePath -Algorithm SHA256).Hash
          $trialHash = (Get-FileHash $trialPath -Algorithm SHA256).Hash
          $trialAnchorHash = (Get-FileHash $trialAnchorPath -Algorithm SHA256).Hash

          function Write-DcmGetServiceDiagnostics {
            Write-Host "--- sc.exe queryex ---"
            & "$env:SystemRoot\System32\sc.exe" queryex $serviceName 2>&1 | Write-Host
            Write-Host "--- sc.exe qc ---"
            & "$env:SystemRoot\System32\sc.exe" qc $serviceName 2>&1 | Write-Host
            Write-Host "--- WinSW service logs ---"
            $serviceLogRoot = Join-Path $env:LOCALAPPDATA "DcmGet\logs\service"
            Get-ChildItem $serviceLogRoot -File -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "### $($_.FullName)"
              Get-Content $_.FullName -Tail 120 -ErrorAction SilentlyContinue | Write-Host
            }
            Write-Host "--- installed DcmGet process trees ---"
            Get-CimInstance Win32_Process -ErrorAction SilentlyContinue |
              Where-Object {
                ([string]$_.ExecutablePath).StartsWith($installDir, [StringComparison]::OrdinalIgnoreCase) -or
                ([string]$_.CommandLine).IndexOf((Join-Path $installDir "kayisoft-dcmget-host.ps1"), [StringComparison]::OrdinalIgnoreCase) -ge 0
              } |
              Select-Object ProcessId, ParentProcessId, Name, ExecutablePath, CommandLine |
              Format-List | Out-String | Write-Host
            Write-Host "--- recent Service Control Manager events ---"
            Get-WinEvent -FilterHashtable @{
              LogName = "System"
              ProviderName = "Service Control Manager"
              StartTime = [DateTime]::Now.AddMinutes(-10)
            } -ErrorAction SilentlyContinue | Select-Object -First 20 TimeCreated, Id, LevelDisplayName, Message | Format-List | Out-String | Write-Host
          }

          function Wait-DcmGetServiceStatus([string]$expected, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
              if ($null -ne $service -and $service.Status.ToString() -eq $expected) { return $service }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            $actual = if ($null -eq $service) { "missing" } else { $service.Status.ToString() }
            Write-DcmGetServiceDiagnostics
            throw "Service $serviceName status is $actual, expected $expected"
          }

          function Wait-DcmGetProfile([int]$profileNumber, [int]$webPort, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $process = @(
                Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                  Where-Object { ([string]$_.CommandLine) -match "--profile\s+$profileNumber(?:\s|$)" }
              )
              if ($process.Count -eq 1) {
                try {
                  $client = [Net.Sockets.TcpClient]::new()
                  $client.Connect("127.0.0.1", $webPort)
                  $client.Dispose()
                  return $process[0]
                } catch {
                  if ($null -ne $client) { $client.Dispose() }
                }
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            throw "Profile $profileNumber did not become ready on Web port $webPort"
          }

          function Wait-DcmGetManagement([int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $process = @(
                Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                  Where-Object { ([string]$_.CommandLine) -match "(?:^|\s)--windows-management(?:\s|$)" }
              )
              if ($process.Count -eq 1) {
                $listeners = @(
                  Get-NetTCPConnection -State Listen -LocalPort $managementPort -ErrorAction SilentlyContinue |
                    Where-Object { $_.OwningProcess -eq $process[0].ProcessId -and $_.LocalAddress -eq "0.0.0.0" }
                )
                if ($listeners.Count -eq 1) {
                  try {
                    $response = Invoke-WebRequest "http://127.0.0.1:$managementPort/" -UseBasicParsing -TimeoutSec 2
                    if ($response.StatusCode -eq 200) { return $process[0] }
                  } catch {}
                }
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            Write-DcmGetServiceDiagnostics
            throw "DcmGet management hub did not become ready on 0.0.0.0:$managementPort"
          }

          function Assert-NoDcmGetServiceApplications {
            $survivors = @(
              Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                Where-Object {
                  ([string]$_.CommandLine) -match "(?:^|\s)--windows-management(?:\s|$)" -or
                  ([string]$_.CommandLine) -match "(?:^|\s)--profile\s+[1-9][0-9]{0,3}(?:\s|$)"
                }
            )
            if ($survivors.Count -ne 0) {
              throw "Service stop left DcmGet manager/profile processes running: $($survivors.ProcessId -join ', ')"
            }
          }

          function Test-TcpPortOpen([int]$port) {
            $client = [Net.Sockets.TcpClient]::new()
            try {
              $pending = $client.ConnectAsync("127.0.0.1", $port)
              return $pending.Wait(500) -and $client.Connected
            } catch { return $false }
            finally { $client.Dispose() }
          }

          $serviceWrapper = Join-Path $installDir "kayisoft-dcmget.exe"
          $serviceConfig = Join-Path $installDir "kayisoft-dcmget.xml"
          $serviceHost = Join-Path $installDir "kayisoft-dcmget-host.ps1"
          @($serviceWrapper, $serviceConfig, $serviceHost, (Join-Path $installDir "LICENSE-WINSW.txt")) | ForEach-Object {
            if (-not (Test-Path -LiteralPath $_ -PathType Leaf)) { throw "Installed service resource is missing: $_" }
          }
          $wrapperHash = (Get-FileHash $serviceWrapper -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($wrapperHash -ne "05b82d46ad331cc16bdc00de5c6332c1ef818df8ceefcd49c726553209b3a0da") {
            throw "Installed WinSW checksum mismatch: $wrapperHash"
          }
          $env:DCMGET_INSTALLED_APPLICATION = (Resolve-Path (Join-Path $installDir "DcmGet.exe")).Path
          python -c "import os; from pathlib import Path; from dcmget.architecture import require_amd64_pe; require_amd64_pe(Path(os.environ['DCMGET_INSTALLED_APPLICATION']))"
          if ($LASTEXITCODE -ne 0) { throw "Installed management application is not AMD64" }
          [xml]$serviceXml = Get-Content -LiteralPath $serviceConfig -Raw
          if ($serviceXml.service.id -ne $serviceName) { throw "Installed service ID is incorrect" }
          if ($serviceXml.service.serviceaccount.user -ne "LocalSystem") { throw "Installed service is not LocalSystem" }
          if ($null -ne $serviceXml.service.serviceaccount.domain) { throw "LocalSystem service unexpectedly has a domain" }
          if ($serviceXml.service.securityDescriptor -ne "D:(A;;GA;;;SY)(A;;GA;;;BA)(A;;CCLCSWRPWP;;;BU)") {
            throw "Installed service security descriptor is incorrect"
          }
          $configuredEnvironment = @{}
          @($serviceXml.service.env) | ForEach-Object { $configuredEnvironment[[string]$_.name] = [string]$_.value }
          if ($configuredEnvironment.APPDATA -ne $env:APPDATA) { throw "Service APPDATA does not belong to the installing user" }
          if ($configuredEnvironment.LOCALAPPDATA -ne $env:LOCALAPPDATA) { throw "Service LOCALAPPDATA does not belong to the installing user" }
          if ($configuredEnvironment.USERPROFILE -ne $env:USERPROFILE) { throw "Service USERPROFILE does not belong to the installing user" }
          $serviceState = Get-ItemProperty "HKLM:\Software\DcmGet\WindowsService" -ErrorAction Stop
          if ($serviceState.AppDataRoot -ne $env:APPDATA) { throw "Stable service APPDATA was not registered" }
          if ($serviceState.LocalAppDataRoot -ne $env:LOCALAPPDATA) { throw "Stable service LOCALAPPDATA was not registered" }
          if ($serviceState.UserProfileRoot -ne $env:USERPROFILE) { throw "Stable service USERPROFILE was not registered" }

          Wait-DcmGetServiceStatus "Running" | Out-Null
          $serviceRecord = Get-CimInstance Win32_Service -Filter "Name = '$serviceName'"
          if ($null -eq $serviceRecord) { throw "Installed service record is missing" }
          if ($serviceRecord.StartMode -ne "Auto") { throw "Installed service is not automatic" }
          if (-not ([string]$serviceRecord.PathName).Trim('"').Equals($serviceWrapper, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Installed service points to the wrong wrapper: $($serviceRecord.PathName)"
          }
          $managementProcess = Wait-DcmGetManagement
          if (-not ([string]$managementProcess.ExecutablePath).Equals($env:DCMGET_INSTALLED_APPLICATION, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Management hub runs the wrong executable: $($managementProcess.ExecutablePath)"
          }

          $profile1ConfigPath = Join-Path $configDir "instances\i1\config.json"
          for ($attempt = 0; $attempt -lt 120 -and -not (Test-Path $profile1ConfigPath -PathType Leaf); $attempt++) {
            Start-Sleep -Milliseconds 250
          }
          if (-not (Test-Path $profile1ConfigPath -PathType Leaf)) { throw "Service did not initialize Profile 1" }
          $profile1Config = Get-Content $profile1ConfigPath -Raw | ConvertFrom-Json
          if ([int]$profile1Config.web_port -ne 8787) { throw "Profile 1 Web port changed from 8787" }
          $profile1Process = Wait-DcmGetProfile 1 ([int]$profile1Config.web_port)

          $profile2Directory = Join-Path $configDir "instances\i2"
          $profile2ConfigPath = Join-Path $profile2Directory "config.json"
          if (-not (Test-Path $profile2ConfigPath -PathType Leaf)) { throw "Dynamic Profile test did not leave Profile 2 configured" }
          $profile2Config = Get-Content $profile2ConfigPath -Raw | ConvertFrom-Json
          $profile2WebPort = [int]$profile2Config.web_port
          $profile2Process = Wait-DcmGetProfile 2 $profile2WebPort

          & "$env:SystemRoot\System32\sc.exe" stop $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not stop service before Profile snapshot restart" }
          Wait-DcmGetServiceStatus "Stopped" | Out-Null
          Assert-NoDcmGetServiceApplications
          if (Test-TcpPortOpen $managementPort) { throw "Management hub port remained open after service stop" }
          if (Test-TcpPortOpen 8787) { throw "Profile 1 Web port remained open after service stop" }
          & "$env:SystemRoot\System32\sc.exe" start $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not restart service for Profile snapshot" }
          Wait-DcmGetServiceStatus "Running" | Out-Null
          $managementProcess = Wait-DcmGetManagement
          $profile1Process = Wait-DcmGetProfile 1 ([int]$profile1Config.web_port)
          $profile2Process = Wait-DcmGetProfile 2 $profile2WebPort

          $profile1Hash = (Get-FileHash $profile1ConfigPath -Algorithm SHA256).Hash
          $profile2Hash = (Get-FileHash $profile2ConfigPath -Algorithm SHA256).Hash
          $serviceProcessIdsBeforeUpgrade = @(
            [int]$managementProcess.ProcessId,
            [int]$profile1Process.ProcessId,
            [int]$profile2Process.ProcessId
          )

          # Reinstall the same release while the service is active.  This proves
          # service-aware upgrade stop/re-register/start behavior and config retention.
          $serviceUpgradeLog = Join-Path $env:RUNNER_TEMP "dcmget-service-active-upgrade.log"
          $serviceUpgrade = Start-Process $setup -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$installDir", "/LOG=$serviceUpgradeLog") -Wait -PassThru
          if ($serviceUpgrade.ExitCode -ne 0) {
            Get-Content -LiteralPath $serviceUpgradeLog -Tail 240 -ErrorAction SilentlyContinue | Write-Host
            Write-DcmGetServiceDiagnostics
            throw "Service-aware upgrade failed with code $($serviceUpgrade.ExitCode)"
          }
          Wait-DcmGetServiceStatus "Running" | Out-Null
          foreach ($oldProcessId in $serviceProcessIdsBeforeUpgrade) {
            if (Get-Process -Id $oldProcessId -ErrorAction SilentlyContinue) { throw "Service-aware upgrade left old manager/profile process running: $oldProcessId" }
          }
          if ((Get-FileHash $configPath -Algorithm SHA256).Hash -ne $configHash) { throw "Service-aware upgrade changed the existing user configuration" }
          if ((Get-FileHash $profile1ConfigPath -Algorithm SHA256).Hash -ne $profile1Hash) { throw "Service-aware upgrade changed Profile 1 configuration" }
          if ((Get-FileHash $profile2ConfigPath -Algorithm SHA256).Hash -ne $profile2Hash) { throw "Service-aware upgrade changed Profile 2 configuration" }
          Wait-DcmGetManagement | Out-Null
          Wait-DcmGetProfile 1 ([int]$profile1Config.web_port) | Out-Null
          Wait-DcmGetProfile 2 $profile2WebPort | Out-Null

          # A repair/upgrade must preserve an intentionally stopped service.
          & "$env:SystemRoot\System32\sc.exe" stop $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not stop service before stopped-state upgrade test" }
          Wait-DcmGetServiceStatus "Stopped" | Out-Null
          Assert-NoDcmGetServiceApplications
          $stoppedServiceUpgradeLog = Join-Path $env:RUNNER_TEMP "dcmget-service-stopped-upgrade.log"
          $stoppedServiceUpgrade = Start-Process $setup -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$installDir", "/LOG=$stoppedServiceUpgradeLog") -Wait -PassThru
          if ($stoppedServiceUpgrade.ExitCode -ne 0) {
            Get-Content -LiteralPath $stoppedServiceUpgradeLog -Tail 240 -ErrorAction SilentlyContinue | Write-Host
            Write-DcmGetServiceDiagnostics
            throw "Stopped-service upgrade failed with code $($stoppedServiceUpgrade.ExitCode)"
          }
          Start-Sleep -Seconds 2
          $serviceAfterStoppedUpgrade = Get-Service -Name $serviceName -ErrorAction Stop
          if ($serviceAfterStoppedUpgrade.Status -ne "Stopped") { throw "Stopped-service upgrade unexpectedly restarted the service" }
          Assert-NoDcmGetServiceApplications
          if ((Get-FileHash $configPath -Algorithm SHA256).Hash -ne $configHash) { throw "Stopped-service upgrade changed the existing user configuration" }
          if ((Get-FileHash $profile1ConfigPath -Algorithm SHA256).Hash -ne $profile1Hash) { throw "Stopped-service upgrade changed Profile 1 configuration" }
          if ((Get-FileHash $profile2ConfigPath -Algorithm SHA256).Hash -ne $profile2Hash) { throw "Stopped-service upgrade changed Profile 2 configuration" }

          # A missing wrapper from an interrupted update must be repairable.  The
          # installer verifies the registered SCM ImagePath instead of requiring
          # the old file itself and still preserves the intentionally stopped state.
          Remove-Item -LiteralPath $serviceWrapper -Force
          $missingWrapperRepairLog = Join-Path $env:RUNNER_TEMP "dcmget-missing-wrapper-repair.log"
          $missingWrapperRepair = Start-Process $setup -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$installDir", "/LOG=$missingWrapperRepairLog") -Wait -PassThru
          if ($missingWrapperRepair.ExitCode -ne 0) {
            Get-Content -LiteralPath $missingWrapperRepairLog -Tail 240 -ErrorAction SilentlyContinue | Write-Host
            throw "Missing-wrapper repair failed with code $($missingWrapperRepair.ExitCode)"
          }
          if (-not (Test-Path -LiteralPath $serviceWrapper -PathType Leaf)) { throw "Missing-wrapper repair did not restore WinSW" }
          if ((Get-FileHash $serviceWrapper -Algorithm SHA256).Hash.ToLowerInvariant() -ne "05b82d46ad331cc16bdc00de5c6332c1ef818df8ceefcd49c726553209b3a0da") {
            throw "Missing-wrapper repair restored the wrong WinSW payload"
          }
          if ((Get-Service -Name $serviceName -ErrorAction Stop).Status -ne "Stopped") { throw "Missing-wrapper repair unexpectedly restarted the service" }
          $serviceStateAfterRepair = Get-ItemProperty "HKLM:\Software\DcmGet\WindowsService" -ErrorAction Stop
          if ($serviceStateAfterRepair.AppDataRoot -ne $serviceState.AppDataRoot -or
              $serviceStateAfterRepair.LocalAppDataRoot -ne $serviceState.LocalAppDataRoot -or
              $serviceStateAfterRepair.UserProfileRoot -ne $serviceState.UserProfileRoot) {
            throw "Missing-wrapper repair changed the stable service user directories"
          }
          & "$env:SystemRoot\System32\sc.exe" start $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not restart service after stopped-state upgrade test" }
          Wait-DcmGetServiceStatus "Running" | Out-Null
          Wait-DcmGetManagement | Out-Null
          Wait-DcmGetProfile 1 ([int]$profile1Config.web_port) | Out-Null
          Wait-DcmGetProfile 2 $profile2WebPort | Out-Null

          $startMenuRoots = @(
            (Join-Path $env:ProgramData "Microsoft\Windows\Start Menu\Programs"),
            (Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs")
          )
          foreach ($shortcutName in @("DcmGet.lnk", "DcmGet 启动后台服务.lnk", "DcmGet 停止后台服务.lnk")) {
            if (-not ($startMenuRoots | Where-Object { Test-Path (Join-Path $_ $shortcutName) -PathType Leaf })) {
              throw "Installed shortcut is missing: $shortcutName"
            }
          }
          $webShortcut = $startMenuRoots | ForEach-Object { Join-Path $_ "DcmGet.lnk" } | Where-Object { Test-Path $_ } | Select-Object -First 1
          $desktopRoots = @(
            (Join-Path $env:PUBLIC "Desktop"),
            (Join-Path $env:USERPROFILE "Desktop")
          )
          $desktopShortcut = $desktopRoots | ForEach-Object { Join-Path $_ "DcmGet.lnk" } | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $desktopShortcut) { throw "Installed DcmGet desktop shortcut is missing" }
          $shell = New-Object -ComObject WScript.Shell
          foreach ($shortcut in @($webShortcut, $desktopShortcut)) {
            $link = $shell.CreateShortcut($shortcut)
            if (-not [string]::Equals($link.TargetPath, (Join-Path $installDir "DcmGet.exe"), [StringComparison]::OrdinalIgnoreCase)) {
              throw "Installed DcmGet shortcut target is incorrect: $shortcut"
            }
            if ($link.Arguments -ne '--native-shell-url "http://127.0.0.1:8786/"') {
              throw "Installed DcmGet shortcut does not open the native management shell: $shortcut"
            }
          }

      - name: Windows service controls, process-tree and uninstall test
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "DcmGetInstalled"
          $upgradeDicomDir = Join-Path $env:RUNNER_TEMP "DcmGetUpgradeDicom"
          $downloadSentinelPath = Join-Path $upgradeDicomDir "keep-download.dcm"
          $configDir = Join-Path $env:APPDATA "DcmGet"
          $configPath = Join-Path $configDir "config.json"
          $licensePath = Join-Path $configDir "license.lic"
          $trialPath = Join-Path $configDir "trial.json"
          $trialAnchorPath = Join-Path $env:ProgramData "DcmGet\.trial-anchor"
