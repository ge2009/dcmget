          $profile2WebPort = [int]$profile2Config.web_port
          $configHash = (Get-FileHash $configPath -Algorithm SHA256).Hash
          $profile1Hash = (Get-FileHash $profile1ConfigPath -Algorithm SHA256).Hash
          $profile2Hash = (Get-FileHash $profile2ConfigPath -Algorithm SHA256).Hash
          $licenseHash = (Get-FileHash $licensePath -Algorithm SHA256).Hash
          $trialHash = (Get-FileHash $trialPath -Algorithm SHA256).Hash
          $trialAnchorHash = (Get-FileHash $trialAnchorPath -Algorithm SHA256).Hash
          $downloadSentinelHash = (Get-FileHash $downloadSentinelPath -Algorithm SHA256).Hash

          function Wait-DcmGetServiceStatus([string]$expected, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
              if ($null -ne $service -and $service.Status.ToString() -eq $expected) { return $service }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            $actual = if ($null -eq $service) { "missing" } else { $service.Status.ToString() }
            throw "Service $serviceName status is $actual, expected $expected"
          }

          function Wait-DcmGetProfile([int]$profileNumber, [int]$webPort, [int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $process = @(
                Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                  Where-Object { ([string]$_.CommandLine) -match "--profile\s+$profileNumber(?:\s|$)" }
              )
              if ($process.Count -eq 1) {
                try {
                  $client = [Net.Sockets.TcpClient]::new()
                  $client.Connect("127.0.0.1", $webPort)
                  $client.Dispose()
                  return $process[0]
                } catch {
                  if ($null -ne $client) { $client.Dispose() }
                }
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            throw "Profile $profileNumber did not become ready on Web port $webPort"
          }

          function Wait-DcmGetManagement([int]$timeoutSeconds = 30) {
            $deadline = [DateTime]::UtcNow.AddSeconds($timeoutSeconds)
            do {
              $process = @(
                Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                  Where-Object { ([string]$_.CommandLine) -match "(?:^|\s)--windows-management(?:\s|$)" }
              )
              if ($process.Count -eq 1) {
                try {
                  $response = Invoke-WebRequest "http://127.0.0.1:$managementPort/" -UseBasicParsing -TimeoutSec 2
                  if ($response.StatusCode -eq 200) { return $process[0] }
                } catch {}
              }
              Start-Sleep -Milliseconds 250
            } while ([DateTime]::UtcNow -lt $deadline)
            throw "DcmGet management hub did not become ready on port $managementPort"
          }

          function Assert-NoDcmGetServiceApplications {
            $survivors = @(
              Get-CimInstance Win32_Process -Filter "Name = 'DcmGet.exe'" -ErrorAction SilentlyContinue |
                Where-Object {
                  ([string]$_.CommandLine) -match "(?:^|\s)--windows-management(?:\s|$)" -or
                  ([string]$_.CommandLine) -match "(?:^|\s)--profile\s+[1-9][0-9]{0,3}(?:\s|$)"
                }
            )
            if ($survivors.Count -ne 0) {
              throw "Service control left DcmGet manager/profile processes running: $($survivors.ProcessId -join ', ')"
            }
          }

          # Verify WinSW kills a service process tree.
          & "$env:SystemRoot\System32\sc.exe" stop $serviceName | Out-Null
          Wait-DcmGetServiceStatus "Stopped" | Out-Null
          $serviceHostBackup = Join-Path $env:RUNNER_TEMP "kayisoft-dcmget-host.real.ps1"
          Copy-Item $serviceHost $serviceHostBackup -Force
          $serviceTreeFixture = Join-Path $env:ProgramData "DcmGet\service-tree-fixture"
          Remove-Item $serviceTreeFixture -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $serviceTreeFixture | Out-Null
          $serviceTreeChild = Join-Path $serviceTreeFixture "service-tree-child.ps1"
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE ".github\scripts\windows-service-tree-child.ps1") $serviceTreeChild -Force
          $fixtureHostSource = @'
          param([string]$Executable, [string]$AppDataRoot, [string]$LocalAppDataRoot, [string]$UserProfileRoot)
          $fixtureRoot = Join-Path $env:ProgramData "DcmGet\service-tree-fixture"
          $childScript = Join-Path $fixtureRoot "service-tree-child.ps1"
          $powerShellExe = "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe"
          $children = @()
          $childRecords = @()
          try {
              foreach ($label in @("DcmGet", "storescp", "movescu", "DcmGetPdiServer")) {
                  $child = Start-Process $powerShellExe -ArgumentList @(
                      "-NoLogo",
                      "-NoProfile",
                      "-ExecutionPolicy", "Bypass",
                      "-File", $childScript,
                      "-Label", $label
                  ) -PassThru -WindowStyle Hidden
                  $children += $child
                  $childCim = Get-CimInstance Win32_Process -Filter "ProcessId = $($child.Id)" -ErrorAction Stop
                  $childRecords += [PSCustomObject]@{
                      Label = $label
                      ProcessId = $child.Id
                      CreationTicks = ([DateTime]$childCim.CreationDate).ToUniversalTime().Ticks
                  }
              }
              $childRecords |
                  ConvertTo-Json -Depth 2 |
                  Set-Content (Join-Path $fixtureRoot "service-tree-identities.json") -Encoding utf8
              while ($true) { Start-Sleep -Seconds 1 }
          } finally {
              foreach ($child in @($children)) {
                  if ($null -eq $child) { continue }
                  try {
                      if (-not $child.HasExited) {
                          & "$env:SystemRoot\System32\taskkill.exe" /PID ([string]$child.Id) /T /F 2>$null | Out-Null
                          [void]$child.WaitForExit(5000)
                      }
                  } catch {
                      Write-Warning "Could not stop fixture process $($child.Id): $($_.Exception.Message)"
                  }
              }
          }
          '@
          [IO.File]::WriteAllText($serviceHost, $fixtureHostSource, [Text.UTF8Encoding]::new($false))
          & "$env:SystemRoot\System32\sc.exe" start $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not start service process-tree fixture" }
          Wait-DcmGetServiceStatus "Running" | Out-Null
          $serviceTreeIdentityFile = Join-Path $serviceTreeFixture "service-tree-identities.json"
          for ($attempt = 0; $attempt -lt 80 -and -not (Test-Path $serviceTreeIdentityFile -PathType Leaf); $attempt++) {
            Start-Sleep -Milliseconds 250
          }
          if (-not (Test-Path $serviceTreeIdentityFile -PathType Leaf)) { throw "Service process-tree fixture did not start" }
          $fixtureLabels = @("DcmGet", "storescp", "movescu", "DcmGetPdiServer")
          $readyFiles = @()
          for ($attempt = 0; $attempt -lt 80; $attempt++) {
            $readyFiles = @(Get-ChildItem $serviceTreeFixture -Filter "ready-*.json" -File -ErrorAction SilentlyContinue)
            if ($readyFiles.Count -eq $fixtureLabels.Count) { break }
            Start-Sleep -Milliseconds 250
          }
          if ($readyFiles.Count -ne $fixtureLabels.Count) { throw "Service tree fixture did not publish all verified children" }
          $childServiceTreeRecords = @(
            $readyFiles | ForEach-Object {
              Get-Content $_.FullName -Raw -Encoding utf8 | ConvertFrom-Json
            }
          )
          $directServiceTreeRecords = @(
            Get-Content $serviceTreeIdentityFile -Raw -Encoding utf8 |
              ConvertFrom-Json
          )
          if (
            $directServiceTreeRecords.Count -ne $fixtureLabels.Count -or
            (@($directServiceTreeRecords.Label | Sort-Object -Unique)).Count -ne $fixtureLabels.Count
          ) {
            throw "Service tree fixture did not maintain all helper processes"
          }
          $directServiceTreeIdentities = @(
            foreach ($record in $directServiceTreeRecords) {
              $directId = [int]$record.ProcessId
              $treeProcess = Get-CimInstance Win32_Process -Filter "ProcessId = $directId" -ErrorAction SilentlyContinue
              if (
                $null -eq $treeProcess -or
                ([DateTime]$treeProcess.CreationDate).ToUniversalTime().Ticks -ne [long]$record.CreationTicks
              ) {
                throw "Service tree fixture direct process no longer running: $directId"
              }
              [PSCustomObject]@{
                ProcessId = [int]$treeProcess.ProcessId
                CreationTicks = [long]$record.CreationTicks
                Name = [string]$treeProcess.Name
                Label = [string]$record.Label
                ParentProcessId = [int]$treeProcess.ParentProcessId
                ExecutablePath = [string]$treeProcess.ExecutablePath
                CommandLine = [string]$treeProcess.CommandLine
              }
            }
          )
          $serviceTreeIdentities = @($directServiceTreeIdentities)
          foreach ($record in $childServiceTreeRecords) {
            $owner = @($directServiceTreeIdentities | Where-Object { $_.Label -eq [string]$record.Label })
            $treeProcess = Get-CimInstance Win32_Process -Filter "ProcessId = $([int]$record.ProcessId)" -ErrorAction SilentlyContinue
            if (
              $owner.Count -ne 1 -or
              $owner[0].ProcessId -ne [int]$record.OwnerProcessId -or
              $null -eq $treeProcess -or
              ([string]$treeProcess.Name) -ine "ping.exe" -or
              ([DateTime]$treeProcess.CreationDate).ToUniversalTime().Ticks -ne [long]$record.CreationTicks
            ) {
              throw "Service tree fixture verified child no longer running: $($record.ProcessId)"
            }
            $serviceTreeIdentities += [PSCustomObject]@{
              ProcessId = [int]$treeProcess.ProcessId
              CreationTicks = [long]$record.CreationTicks
              Name = [string]$treeProcess.Name
              ParentProcessId = [int]$treeProcess.ParentProcessId
              ExecutablePath = [string]$treeProcess.ExecutablePath
              CommandLine = [string]$treeProcess.CommandLine
            }
          }
          & "$env:SystemRoot\System32\sc.exe" stop $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not stop service process-tree fixture" }
          Wait-DcmGetServiceStatus "Stopped" | Out-Null
          Start-Sleep -Seconds 1
          foreach ($expectedProcess in $serviceTreeIdentities) {
            $survivor = Get-CimInstance Win32_Process -Filter "ProcessId = $($expectedProcess.ProcessId)" -ErrorAction SilentlyContinue
            if (
              $null -ne $survivor -and
              ([DateTime]$survivor.CreationDate).ToUniversalTime().Ticks -eq $expectedProcess.CreationTicks
            ) {
              $expectedProcess | Format-List | Out-String | Write-Host
              $survivor | Select-Object ProcessId, ParentProcessId, Name, ExecutablePath, CommandLine, CreationDate | Format-List | Out-String | Write-Host
              throw "Service tree process survived stop: $($expectedProcess.ProcessId)"
            }
          }
          Copy-Item $serviceHostBackup $serviceHost -Force
          Remove-Item $serviceTreeFixture -Recurse -Force
          & "$env:SystemRoot\System32\sc.exe" start $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not restart real DcmGet service host" }
          Wait-DcmGetServiceStatus "Running" | Out-Null
          Wait-DcmGetManagement | Out-Null
          Wait-DcmGetProfile 1 ([int]$profile1Config.web_port) | Out-Null
          Wait-DcmGetProfile 2 $profile2WebPort | Out-Null

          # Builtin Users receive only query/start/stop rights.  Running sc.exe
          # under a fresh ordinary account proves daily operations need no UAC.
          $opsUser = "DcmGetOpsCI"
          $opsPasswordText = "Dg!" + [Guid]::NewGuid().ToString("N").Substring(0, 11)
          & "$env:SystemRoot\System32\net.exe" user $opsUser $opsPasswordText /add | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not create ordinary service-control test user" }
          try {
            $opsCredential = [PSCredential]::new(
              "$env:COMPUTERNAME\$opsUser",
              (ConvertTo-SecureString $opsPasswordText -AsPlainText -Force)
            )
            function Invoke-ScAsOrdinaryUser([string[]]$scArguments) {
              $result = Start-Process "$env:SystemRoot\System32\sc.exe" -ArgumentList $scArguments -Credential $opsCredential -LoadUserProfile -WindowStyle Hidden -Wait -PassThru
              if ($result.ExitCode -ne 0) { throw "Ordinary user sc.exe failed ($($scArguments -join ' ')): $($result.ExitCode)" }
            }
            Invoke-ScAsOrdinaryUser @("query", $serviceName)
            Invoke-ScAsOrdinaryUser @("stop", $serviceName)
            Wait-DcmGetServiceStatus "Stopped" | Out-Null
            Assert-NoDcmGetServiceApplications
            Invoke-ScAsOrdinaryUser @("query", $serviceName)
            Invoke-ScAsOrdinaryUser @("start", $serviceName)
            Wait-DcmGetServiceStatus "Running" | Out-Null
            Wait-DcmGetManagement | Out-Null
            Wait-DcmGetProfile 1 ([int]$profile1Config.web_port) | Out-Null
            Wait-DcmGetProfile 2 $profile2WebPort | Out-Null
          } finally {
            & "$env:SystemRoot\System32\net.exe" user $opsUser /delete | Out-Null
          }

          $process = Start-Process "$installDir/DcmGet.exe" -ArgumentList "--self-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Installed self-test failed with code $($process.ExitCode)" }
          $upgradeWeb = Start-Process "$installDir/DcmGet.exe" -ArgumentList @("--web-self-test", "--config", "`"$configPath`"") -Wait -PassThru
          if ($upgradeWeb.ExitCode -ne 0) { throw "Installed Web self-test failed with code $($upgradeWeb.ExitCode)" }
          $diagnosticLogs = @(
            Get-ChildItem (Join-Path $env:LOCALAPPDATA "DcmGet\logs") -Filter "dcmget-diagnostics-*.log" -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Length -gt 0 }
          )
          if ($diagnosticLogs.Count -lt 1) { throw "Installed self-test did not write a process-specific diagnostic log" }

          # Exercise the uninstaller's sc.exe fallback for an interrupted install
          # where the registered service remains but the WinSW file is missing.
          & "$env:SystemRoot\System32\sc.exe" stop $serviceName | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Could not stop service before missing-wrapper uninstall test" }
          Wait-DcmGetServiceStatus "Stopped" | Out-Null
          Assert-NoDcmGetServiceApplications
          Remove-Item -LiteralPath $serviceWrapper -Force
          $uninstall = Start-Process "$installDir/unins000.exe" -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART") -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Uninstaller failed with exit code $($uninstall.ExitCode)" }
          if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) { throw "Uninstall left kayisoft-dcmget service behind" }
          if (Test-Path "HKLM:\Software\DcmGet\WindowsService") { throw "Uninstall left stable service state behind" }
          $serviceSurvivors = @(
            Get-CimInstance Win32_Process -ErrorAction SilentlyContinue |
              Where-Object {
                ([string]$_.ExecutablePath).StartsWith($installDir + [IO.Path]::DirectorySeparatorChar, [StringComparison]::OrdinalIgnoreCase) -or
                ([string]$_.CommandLine).IndexOf("kayisoft-dcmget-host.ps1", [StringComparison]::OrdinalIgnoreCase) -ge 0
              }
          )
          if ($serviceSurvivors.Count -ne 0) { throw "Uninstall left DcmGet service processes behind: $($serviceSurvivors.ProcessId -join ', ')" }
          Assert-NoDcmGetServiceApplications
          # Inno Setup documents that its temporary uninstall clone can still be
          # deleting the original executable after the parent returns an exit code.
          for ($attempt = 0; $attempt -lt 120 -and (Test-Path $installDir); $attempt++) {
            Start-Sleep -Milliseconds 250
          }
          if (Test-Path $installDir) {
            Write-Host "--- Remaining installation directory contents ---"
            Get-ChildItem $installDir -Force -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize | Out-String | Write-Host
            throw "Installation directory remains after uninstall"
          }
          if ((Get-FileHash $configPath -Algorithm SHA256).Hash -ne $configHash) { throw "Uninstall removed or changed the user configuration" }
          if ((Get-FileHash $profile1ConfigPath -Algorithm SHA256).Hash -ne $profile1Hash) { throw "Uninstall removed or changed Profile 1 configuration" }
          if ((Get-FileHash $profile2ConfigPath -Algorithm SHA256).Hash -ne $profile2Hash) { throw "Uninstall removed or changed Profile 2 configuration" }
          if ((Get-FileHash $licensePath -Algorithm SHA256).Hash -ne $licenseHash) { throw "Uninstall removed or changed the license" }
          if ((Get-FileHash $trialPath -Algorithm SHA256).Hash -ne $trialHash) { throw "Uninstall removed or changed the trial state" }
          if ((Get-FileHash $trialAnchorPath -Algorithm SHA256).Hash -ne $trialAnchorHash) { throw "Uninstall removed or changed the machine trial anchor" }
          if ((Get-FileHash $downloadSentinelPath -Algorithm SHA256).Hash -ne $downloadSentinelHash) { throw "Uninstall removed or changed downloaded DICOM data" }
          if (-not ($diagnosticLogs | Where-Object { Test-Path $_.FullName })) { throw "Uninstall removed the diagnostic log" }
          if (Get-NetFirewallRule -DisplayName "DcmGet Receiver TCP" -ErrorAction SilentlyContinue) { throw "Uninstall left the receiver firewall rule behind" }
          if (Get-NetFirewallRule -DisplayName "DcmGet Web TCP" -ErrorAction SilentlyContinue) { throw "Uninstall left the Web firewall rule behind" }
          if (Get-NetFirewallRule -DisplayName "DcmGet storescp TCP" -ErrorAction SilentlyContinue) { throw "Uninstall left the legacy storescp rule behind" }
          if (Get-NetFirewallRule -DisplayName "DcmGet storescp TCP 6666" -ErrorAction SilentlyContinue) { throw "Uninstall left the legacy firewall rule behind" }
          Remove-Item $configDir -Recurse -Force
          Remove-Item $upgradeDicomDir -Recurse -Force

      - name: Enforce Windows x64 gate, verify signatures, and finalize manifest
        shell: pwsh
        run: |
          python scripts/windows_release_gate.py `
            --release-dir release/windows `
            --version "${{ inputs.version }}" `
            --amd64-pe build/windows/dist/DcmGet/DcmGet.exe `
            --amd64-pe build/windows/dist/DcmGetPdiServer.exe `
            --amd64-pe "release/windows/DcmGet-${{ inputs.version }}-windows-x64-portable.exe" `
            --amd64-pe ".runtime/winsw/v2.12.0/WinSW-x64.exe" `
            --dcmtk-bin "build/windows/dcmtk-runtime/dcmtk-3.7.0-win64-dynamic/bin" `
            --verify-existing-signatures

      - name: Download previous stable release for component diff
        if: ${{ inputs.publish_release && inputs.component_update }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ inputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseJson = gh api "repos/$env:GITHUB_REPOSITORY/releases/latest"
          if ($LASTEXITCODE -ne 0) {
            throw "component_update requires a previous stable GitHub Release"
          }
          $release = $releaseJson | ConvertFrom-Json
          $releaseTag = [string]$release.tag_name
          $tagPattern = '^(?:component-)?v(?<version>\d+\.\d+\.\d+)$'
          if ($releaseTag -notmatch $tagPattern) {
            throw "Previous release tag is not vX.Y.Z or component-vX.Y.Z: $releaseTag"
          }
          $tagVersion = [string]$Matches["version"]
          $assetNames = @($release.assets | ForEach-Object { [string]$_.name })
          foreach ($required in @("UPDATE-MANIFEST.json", "UPDATE-MANIFEST.signed.json")) {
            if ($assetNames -notcontains $required) {
              throw "Previous stable release does not support component updates: missing $required"
            }
          }
          $snapshotName = "component-baseline.zip"
          $fullArchiveName = "DcmGet-$tagVersion-windows-x64.zip"
          if ($assetNames -contains $snapshotName) {
            $archiveName = $snapshotName
            $usesFullRelease = $false
          } elseif ($assetNames -contains $fullArchiveName) {
            $archiveName = $fullArchiveName
            $usesFullRelease = $true
          } else {
            throw "Previous stable release has neither $snapshotName nor $fullArchiveName"
          }
          $baseline = Join-Path $env:RUNNER_TEMP "dcmget-update-baseline"
          Remove-Item $baseline -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $baseline | Out-Null
          gh release download $release.tag_name `
            --repo $env:GITHUB_REPOSITORY `
            --pattern $archiveName `
            --pattern "UPDATE-MANIFEST.json" `
            --pattern "UPDATE-MANIFEST.signed.json" `
            --dir $baseline
          if ($LASTEXITCODE -ne 0) { throw "Could not download previous stable update assets" }

          $manifestPath = Join-Path $baseline "UPDATE-MANIFEST.json"
          $signaturePath = Join-Path $baseline "UPDATE-MANIFEST.signed.json"
          $rawManifest = [IO.File]::ReadAllBytes($manifestPath)
          python -c "import sys; from pathlib import Path; from dcmget.update_signing import verify_manifest; from dcmget.update_trust import TRUSTED_UPDATE_PUBLIC_KEYS; assert verify_manifest(Path(sys.argv[1]).read_bytes(), TRUSTED_UPDATE_PUBLIC_KEYS) == Path(sys.argv[2]).read_bytes()" $signaturePath $manifestPath
          if ($LASTEXITCODE -ne 0) {
            throw "Previous signed manifest content mismatch"
          }
          try {
            $utf8 = [Text.UTF8Encoding]::new($false, $true)
            $manifest = $utf8.GetString($rawManifest) | ConvertFrom-Json
          } catch {
            throw "Previous signed manifest is not valid UTF-8 JSON: $_"
          }
          if (
            [string]$manifest.product -ne "DcmGet" -or
            [string]$manifest.platform -ne "windows-x64" -or
            [string]$manifest.channel -ne "stable"
          ) {
            throw "Previous signed manifest identity is invalid"
          }
          $baseVersion = [string]$manifest.version
          if ($baseVersion -ne $tagVersion) {
            throw "Previous release tag and signed manifest version mismatch: $tagVersion / $baseVersion"
          }
          if ([Version]$baseVersion -ge [Version]$env:TARGET_VERSION) {
            throw "Previous signed baseline version must be lower than target version: $baseVersion / $env:TARGET_VERSION"
          }

          $expanded = Join-Path $baseline "expanded"
          Expand-Archive (Join-Path $baseline $archiveName) $expanded
          $installRoot = if ($usesFullRelease) {
            Join-Path $expanded "DcmGet"
          } else {
            $expanded
          }
          if (-not (Test-Path (Join-Path $installRoot "DcmGet.exe") -PathType Leaf)) {
            throw "Previous stable baseline does not contain DcmGet.exe"
          }
          "DCMGET_UPDATE_BASE_VERSION=$baseVersion" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "DCMGET_UPDATE_BASE_ROOT=$installRoot" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "DCMGET_UPDATE_BASE_MANIFEST=$manifestPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "DCMGET_UPDATE_BASE_SIGNATURE=$signaturePath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build authenticated Windows update feed
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          DCMGET_ENABLE_COMPONENT_PATCH: ${{ inputs.component_update }}
          DCMGET_UPDATE_SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.DCMGET_UPDATE_SIGNING_PRIVATE_KEY_BASE64 }}
        run: |
          $ErrorActionPreference = "Stop"
          $arguments = @(
            "scripts/build_windows_update.py",
            "--release-dir", "release/windows",
            "--version", "${{ inputs.version }}",
            "--install-root", "build/windows/dist/DcmGet",
            "--release-manifest", "release/windows/RELEASE-MANIFEST.json",
            "--full-installer", "release/windows/DcmGet-${{ inputs.version }}-Setup-x64.exe",
            "--compatibility-root", ".",
            "--compatibility-file", "packaging/windows/dcmget.iss",
            "--compatibility-file", "packaging/windows/LICENSE-WINSW.txt",
            "--compatibility-file", "packaging/windows/kayisoft-dcmget-host.ps1",
            "--compatibility-file", "packaging/windows/kayisoft-dcmget.xml.template",
            "--compatibility-file", "requirements.txt",
            "--compatibility-file", "requirements-build.txt",
            "--compatibility-file", "scripts/build_windows.py",
            "--compatibility-file", "scripts/build_windows_update.py",
            "--compatibility-file", "scripts/download_dcmtk.py",
            "--compatibility-file", "scripts/prepare_ohif.py"
          )
          if ($env:DCMGET_ENABLE_COMPONENT_PATCH -eq "true") {
            $arguments += @(
              "--enable-component-patch",
              "--baseline-install-root", $env:DCMGET_UPDATE_BASE_ROOT,
              "--base-version", $env:DCMGET_UPDATE_BASE_VERSION,
              "--base-update-manifest", $env:DCMGET_UPDATE_BASE_MANIFEST,
              "--base-update-signature", $env:DCMGET_UPDATE_BASE_SIGNATURE
            )
          }
          python @arguments
          if ($LASTEXITCODE -ne 0) { throw "Windows update feed build failed" }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DcmGet-${{ inputs.version }}-Setup-x64
          path: |
            release/windows/DcmGet-${{ inputs.version }}-Setup-x64.exe
            release/windows/SHA256SUMS.txt
            release/windows/RELEASE-MANIFEST.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload Windows portable application
        uses: actions/upload-artifact@v4
        with:
          name: DcmGet-${{ inputs.version }}-Portable-x64
          path: |
            release/windows/DcmGet-${{ inputs.version }}-windows-x64-portable.exe
            release/windows/SHA256SUMS.txt
            release/windows/RELEASE-MANIFEST.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload Windows standalone archive
        uses: actions/upload-artifact@v4
        with:
          name: DcmGet-${{ inputs.version }}-Windows-x64-ZIP
          path: |
            release/windows/DcmGet-${{ inputs.version }}-windows-x64.zip
            release/windows/SHA256SUMS.txt
            release/windows/RELEASE-MANIFEST.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Stage signed GitHub Release payload
        if: ${{ inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: DcmGet-${{ inputs.version }}-GitHub-Release
          path: |
            release/windows/DcmGet-${{ inputs.version }}-Setup-x64.exe
            release/windows/DcmGet-${{ inputs.version }}-windows-x64-portable.exe
            release/windows/DcmGet-${{ inputs.version }}-windows-x64.zip
            release/windows/DcmGet-${{ inputs.version }}-windows-x64-components-from-*.zip
            release/windows/SHA256SUMS.txt
            release/windows/RELEASE-MANIFEST.json
            release/windows/UPDATE-MANIFEST.json
            release/windows/UPDATE-MANIFEST.signed.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    name: Publish Windows x64 Release
    if: ${{ inputs.publish_release }}
    needs: build
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install manifest verification dependency
        run: python -m pip install "cryptography>=44,<47"

      - name: Download verified release payload
        uses: actions/download-artifact@v4
        with:
          name: DcmGet-${{ inputs.version }}-GitHub-Release
          path: release

      - name: Recheck signed x64 release metadata
        shell: bash
        run: |
          python - <<'PY'
          import json
          import hashlib
          import os
          import re
          import zipfile
          from pathlib import Path
          from pathlib import PurePosixPath

          from dcmget.update_signing import verify_manifest
          from dcmget.update_trust import TRUSTED_UPDATE_PUBLIC_KEYS

          root = Path("release")
          release = json.loads((root / "RELEASE-MANIFEST.json").read_text(encoding="utf-8"))
          raw_update = (root / "UPDATE-MANIFEST.json").read_bytes()
          envelope_path = root / "UPDATE-MANIFEST.signed.json"
          if verify_manifest(envelope_path.read_bytes(), TRUSTED_UPDATE_PUBLIC_KEYS) != raw_update:
              raise SystemExit("UPDATE-MANIFEST.json does not match the Ed25519 signed content")
          update = json.loads(raw_update.decode("utf-8"))
          expected = os.environ["EXPECTED_VERSION"]
          if release.get("product") != "DcmGet" or release.get("platform") != "windows-x64":
              raise SystemExit("release manifest is not DcmGet windows-x64")
          if release.get("version") != expected or update.get("version") != expected:
              raise SystemExit("release version does not match workflow input")
          signing = release.get("signing", {})
          if signing.get("status") not in {"SIGNED", "UNSIGNED"}:
              raise SystemExit("release signing status is invalid")
          if signing.get("status") == "SIGNED" and signing.get("timestamped") is not True:
              raise SystemExit("signed release has no timestamp")
          artifacts = update.get("artifacts")
          if not isinstance(artifacts, list) or not any(
              item.get("kind") == "full_installer" and item.get("signature_status") in {"SIGNED", "UNSIGNED"}
              for item in artifacts if isinstance(item, dict)
          ):
              raise SystemExit("update manifest has no full installer")
          install_tree = str(update.get("install_tree_sha256", "")).lower()
          if re.fullmatch(r"[0-9a-f]{64}", install_tree) is None:
              raise SystemExit("update manifest has no valid install tree SHA-256")
          archive_path = root / f"DcmGet-{expected}-windows-x64.zip"
          tree_records = {}
          with zipfile.ZipFile(archive_path) as archive:
              for info in archive.infolist():
                  if info.is_dir():
                      continue
                  pure = PurePosixPath(info.filename.replace("\\", "/"))
                  if pure.is_absolute() or ".." in pure.parts or not pure.parts:
                      raise SystemExit(f"standalone archive path is unsafe: {info.filename}")
                  if pure.parts[0] != "DcmGet" or len(pure.parts) < 2:
                      raise SystemExit(f"standalone archive path is outside DcmGet: {info.filename}")
                  relative = PurePosixPath(*pure.parts[1:]).as_posix()
                  if relative != "DcmGet.exe" and not relative.startswith("_internal/"):
                      raise SystemExit(f"standalone archive path is outside update scope: {relative}")
                  if relative.casefold() in tree_records:
                      raise SystemExit(f"standalone archive path is duplicated: {relative}")
                  digest = hashlib.sha256()
                  with archive.open(info) as source:
                      for block in iter(lambda: source.read(1024 * 1024), b""):
                          digest.update(block)
                  tree_records[relative.casefold()] = (relative, info.file_size, digest.hexdigest())
          if "dcmget.exe" not in tree_records:
              raise SystemExit("standalone archive has no DcmGet.exe")
          tree_digest = hashlib.sha256()
          for relative, size, digest in sorted(tree_records.values()):
              tree_digest.update(relative.encode("utf-8"))
              tree_digest.update(b"\0")
              tree_digest.update(str(size).encode("ascii"))
              tree_digest.update(b"\0")
              tree_digest.update(digest.encode("ascii"))
              tree_digest.update(b"\n")
          if tree_digest.hexdigest() != install_tree:
              raise SystemExit("standalone archive tree does not match signed update manifest")
          for item in artifacts:
              if not isinstance(item, dict) or item.get("kind") != "component_patch":
                  continue
              base_tree = str(item.get("base_tree_sha256", "")).lower()
              target_tree = str(item.get("target_tree_sha256", "")).lower()
              if re.fullmatch(r"[0-9a-f]{64}", base_tree) is None:
                  raise SystemExit("component patch has no valid base tree SHA-256")
              if target_tree != install_tree:
                  raise SystemExit("component patch target tree does not match release tree")
          if not envelope_path.is_file():
              raise SystemExit("authenticated update manifest is missing")
          PY
        env:
          EXPECTED_VERSION: ${{ inputs.version }}

      - name: Publish immutable stable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; refusing to replace published update assets." >&2
            exit 1
          fi
          gh release create "$tag" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "DcmGet ${{ inputs.version }}" \
            --generate-notes \
            --latest
