name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: dcmget-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            dcmtk: windows-x86_64
          - name: Linux x64
            os: ubuntu-24.04
            dcmtk: linux-x86_64
          - name: macOS ARM64
            os: macos-15
            dcmtk: macos-arm64
          - name: macOS Intel
            os: macos-15-intel
            dcmtk: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install source and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install .

      - name: Verify runtime DICOM networking dependency
        run: python -c "import pynetdicom; assert pynetdicom.__version__.split('.')[0] == '3'"

      - name: Cache DCMTK 3.7.0
        uses: actions/cache@v4
        with:
          path: |
            .runtime/dcmtk/${{ matrix.dcmtk }}
            .runtime/downloads
          key: dcmtk-3.7.0-integrity-v2-${{ matrix.dcmtk }}

      - name: Download OFFIS DCMTK 3.7.0
        run: python scripts/download_dcmtk.py --platform ${{ matrix.dcmtk }}

      - name: Verify DCMTK version and PDI tools
        run: python -c "from dcmget.core import DcmtkResolver; t=DcmtkResolver().resolve(); assert t.version == '3.7.0'; assert t.dcmmkdir"

      - name: Run unit and DICOM integration tests
        run: >-
          python -m pytest -q
          --ignore=tests/test_auth_ui.py
          --ignore=tests/test_diagnostics.py
          --ignore=tests/test_pdi_ui.py
          --ignore=tests/test_task_controller.py
          --ignore=tests/test_task_widgets.py
          --ignore=tests/test_ui.py
          --ignore=tests/test_ui_multitask.py

      - name: Run UI tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          python -m pytest -q
          tests/test_auth_ui.py
          tests/test_diagnostics.py
          tests/test_pdi_ui.py
          tests/test_task_controller.py
          tests/test_task_widgets.py
          tests/test_ui.py
          tests/test_ui_multitask.py

      - name: Build source deployment package
        if: matrix.dcmtk == 'linux-x86_64'
        run: python scripts/build_deploy_bundle.py

      - name: Upload source deployment package
        if: matrix.dcmtk == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: dcmget-2.8.1-source-deploy
          path: |
            release/dcmget-2.8.1-source-deploy.zip
            release/dcmget-2.8.1-source-deploy.zip.sha256
          if-no-files-found: error

  minimum-python:
    name: Python 3.10 minimum
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install source and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install .

      - name: Verify runtime DICOM networking dependency
        run: python -c "import pynetdicom; assert pynetdicom.__version__.split('.')[0] == '3'"

      - name: Verify minimum supported Python and UI startup
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q -m "not integration" --ignore=tests/test_auth_ui.py --ignore=tests/test_diagnostics.py --ignore=tests/test_pdi_ui.py --ignore=tests/test_task_controller.py --ignore=tests/test_task_widgets.py --ignore=tests/test_ui.py --ignore=tests/test_ui_multitask.py
          python -m pytest -q tests/test_auth_ui.py tests/test_diagnostics.py tests/test_pdi_ui.py tests/test_task_controller.py tests/test_task_widgets.py tests/test_ui.py tests/test_ui_multitask.py
          python DICOM_download_ui.py --ui-self-test --config "${{ runner.temp }}/dcmget-ui-self-test.json"
