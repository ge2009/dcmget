name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: dcmget-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            dcmtk: windows-x86_64
          - name: Linux x64
            os: ubuntu-24.04
            dcmtk: linux-x86_64
          - name: macOS ARM64
            os: macos-15
            dcmtk: macos-arm64
          - name: macOS Intel
            os: macos-15-intel
            dcmtk: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install source and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install .

      - name: Cache DCMTK 3.7.0
        uses: actions/cache@v4
        with:
          path: .runtime/dcmtk/${{ matrix.dcmtk }}
          key: dcmtk-3.7.0-${{ matrix.dcmtk }}

      - name: Download OFFIS DCMTK 3.7.0
        run: python scripts/download_dcmtk.py --platform ${{ matrix.dcmtk }}

      - name: Verify DCMTK version
        run: python -c "from dcmget.core import DcmtkResolver; assert DcmtkResolver().resolve().version == '3.7.0'"

      - name: Run unit, UI and DICOM integration tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build source deployment package
        if: matrix.dcmtk == 'linux-x86_64'
        run: python scripts/build_deploy_bundle.py

      - name: Upload source deployment package
        if: matrix.dcmtk == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: dcmget-2.4.0-source-deploy
          path: |
            release/dcmget-2.4.0-source-deploy.zip
            release/dcmget-2.4.0-source-deploy.zip.sha256
          if-no-files-found: error

  minimum-python:
    name: Python 3.10 minimum
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install source and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install .

      - name: Verify minimum supported Python and UI startup
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q -m "not integration"
          python DICOM_download_ui.py --ui-self-test --config "${{ runner.temp }}/dcmget-ui-self-test.json"
