server {
    listen 80;
    listen [::]:80;
    server_name dcmget.v2ex.com.cn;

    root /www/sites/dcmget.v2ex.com.cn/index;
    index index.html;
    autoindex off;
    charset utf-8;
    etag on;

    access_log /www/sites/dcmget.v2ex.com.cn/logs/access.log;
    error_log /www/sites/dcmget.v2ex.com.cn/logs/error.log warn;

    location = /healthz {
        limit_except GET HEAD { deny all; }
        default_type text/plain;
        add_header Cache-Control "no-store, max-age=0" always;
        return 200 "ok\n";
    }

    location = / {
        limit_except GET HEAD { deny all; }
        add_header Cache-Control "no-store, max-age=0" always;
        try_files /index.html =404;
    }

    location = /index.html {
        limit_except GET HEAD { deny all; }
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    location = /updates/stable/UPDATE-MANIFEST.json.p7 {
        limit_except GET HEAD { deny all; }
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ^~ /updates/releases/ {
        limit_except GET HEAD { deny all; }
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /.well-known/ {
        limit_except GET HEAD { deny all; }
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    location ^~ /. {
        return 404;
    }

    location / {
        limit_except GET HEAD { deny all; }
        try_files $uri =404;
    }
}
