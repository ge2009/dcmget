server {
    listen 80;
    listen [::]:80;
    server_name dcmget.v2ex.com.cn;

    root /www/sites/dcmget.v2ex.com.cn/index;

    location ^~ /.well-known/acme-challenge/ {
        limit_except GET HEAD { deny all; }
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        limit_except GET HEAD { deny all; }
        return 301 https://dcmget.v2ex.com.cn$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dcmget.v2ex.com.cn;

    ssl_certificate /www/sites/dcmget.v2ex.com.cn/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/dcmget.v2ex.com.cn/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:DCMGET_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /www/sites/dcmget.v2ex.com.cn/index;
    index index.html;
    autoindex off;
    charset utf-8;
    etag on;

    access_log /www/sites/dcmget.v2ex.com.cn/logs/access.log;
    error_log /www/sites/dcmget.v2ex.com.cn/logs/error.log warn;

    location = /healthz {
        limit_except GET HEAD { deny all; }
        default_type text/plain;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-store, max-age=0" always;
        return 200 "ok\n";
    }

    location = / {
        limit_except GET HEAD { deny all; }
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-store, max-age=0" always;
        try_files /index.html =404;
    }

    location = /index.html {
        limit_except GET HEAD { deny all; }
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    location = /updates/stable/UPDATE-MANIFEST.signed.json {
        limit_except GET HEAD { deny all; }
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ^~ /updates/releases/ {
        limit_except GET HEAD { deny all; }
        expires 365d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /.well-known/acme-challenge/ {
        limit_except GET HEAD { deny all; }
        default_type text/plain;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    location ^~ /. {
        return 404;
    }

    location / {
        limit_except GET HEAD { deny all; }
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }
}
